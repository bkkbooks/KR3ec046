body:
  text: 卷之二上品菟絲子氣味辛平無毒主續絶傷益氣力補不足肥健人汁去面䵟久服明目輕身延年陳修園曰菟絲氣平稟金氣味辛得金味肺藥也然其用在腎而不在肺子中脂膏最足絶類人精金生水也主續絶傷者子中脂膏如絲不斷善於補續也補不足者取其最足之脂膏以填補其不足之精血也精血足則氣力自長肥健自增矣汁去面䵟者言不獨內服得其填補之功即外用亦得其滑澤之效也久服腎水足則目明腎氣壯則身輕華元化云腎者性命之根也腎得補則延年葳蕤氣味甘平無毒主中風暴熱不能動搖跌筋結肉諸不足久服去面䵟黑好顏色潤澤輕身不老張隱菴曰葳蕤氣味甘平質多津液稟太陰濕土之精以資中焦之汁主中風暴熱不能搖動者以津液為邪熱所灼也跌筋者筋不柔和也結肉者肉無膏澤也諸不足者申明以上諸證皆屬津液不足也久服則津液充滿故去面上之黑䵟好顏色而肌膚潤澤且輕身不老也又曰陰柔之藥豈堪重用古人除治風熱以外絶不敢用自李時珍有不寒不燥用代參耆之說時醫信為補劑虛證服此百無一生咎其誰職耶沙參氣味苦微寒無毒主血結驚氣除寒熱補中益肺氣參葉天士沙參氣微寒稟水氣而入腎味苦無毒得火味而入心謂其得水氣以瀉心火之有餘也心火亢則所主之血不行而為結而味之苦可以攻之心火亢則所藏之神不寧而生驚而氣之寒可以平之心火稟炎上之性火鬱則寒火發則熱而苦寒能清心火故能除寒熱也陰者所以守中者也苦寒益陰所以補中補中則金得土生又無火克所以益肺氣也遠志氣味苦溫無毒主逆咳傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力久服輕身不老按遠志氣溫稟厥陰風木之氣入手厥陰心包味苦得少陰君火之味入手少陰心然心包為相火而主之者心也火不刑金則咳逆之病愈火歸土中則傷中之病愈主明則下安安則不外興利除弊兩大事即補不足除邪氣之說也心為一身之主宰凡九竅利智慧益耳聰目明善記不忘志強力壯所謂天君泰百體從令者此也又云久服輕身不老者即內經所謂主明則下安以此養生則壽之說也夫曰養生曰久服言其為服食之品不可以之治病故經方中絶無此味今人喜用藥丸為補養久則增氣而成病唯以補心之藥為主又以四藏之藥為佐如四方諸侯皆出所有以貢天子即乾綱克振天下皆寧之道也諸藥皆偏唯專於補心則不痛抱朴子謂陵陽子仲服遠志二十七年有子三十七人開書所視記而不忘著其久服之效也若以之治病則大失經旨矣菖蒲氣味辛溫無毒主風寒濕痹咳逆上氣開心竅補五臟通九竅明耳目出聲音主耳聾癰瘡溫腸胃止小便利久服輕身不忘不迷惑延年益心智高志不老陳修園曰菖蒲性用略同遠志但彼苦而此辛且生於水石之中受太陽寒水之氣其味辛合於肺金而主表其氣溫合於心包絡之經通於君火而主神其主風寒濕痹咳逆上氣者從肺驅邪以解表也開心竅至末句皆言補心之效其功同於遠志聲音不出此能寧之心火下濟而光明故能溫腸胃而止小便利也但菖蒲稟水精之氣外通九竅內濡五臟其性自下以行於上與遠志自上以行於下者有別赤箭氣味辛溫無毒主殺鬼精物蠱毒惡風久服益氣力長陰肥健輕身增年張隱菴曰赤箭氣味辛溫其根名天麻者氣味甘平蓋赤箭辛溫屬金金能制風而有弧矢之威故主殺鬼精物天麻甘平屬土土能勝濕而居五運之中故能治蠱毒惡風天麻形如芋魁有遊子十二枚周環之以仿十二辰十二子在外應六氣之司天天麻如皇極之居中得氣運之全故功同五芝力倍五參為仙家服食上品是以久服益氣力長陰肥健李時珍曰補益上藥天麻第一世人止用之治風良可惜也車前子氣味甘寒無毒主氣癃止痛利水道通小便除濕痹久服輕身耐老張隱菴曰車前草本經名當道毛詩名芣苡乾坤有動靜夫坤其靜也翕其動也闢車前好生道旁雖牛馬踐踏不死蓋得土氣之用動而不靜者也氣癃膀胱之氣閉也閉則痛痛則水道不利車前得土氣之用土氣行則水道亦行而不癃不癃則不痛而小便長矣土氣行則濕邪散濕邪散則濕痹自除矣久服土氣升而水氣布故能輕身耐老神仙服食經云車前雷之精也震為雷為長男詩言采采芣苡亦欲妊娠而生男也羌活氣味苦甘辛無毒主風寒所擊金瘡止痛奔豚止癇痙女子疝瘕久服輕身耐老一名獨活陳修園曰羌活氣平稟金氣而入肺味苦甘無毒得火味而入心得土味而入脾其主風寒所擊者入肺以御皮毛之風寒入脾以御肌肉之風寒入心助太陽之氣以御營衛之風寒也其主金瘡止痛者亦和營衛長肌肉完皮毛之功也奔豚乃水氣上凌心火此能入肺以降其逆補土以制其水入心以扶心火之衰所以主之癇痙者木動則生風風動則挾木勢而害土土病則聚液而成痰痰迸於心則為痙為癇此物稟金氣以制風得土味而補脾得火味以寧心所以主之女子疝瘕多經行後血假風濕而成此能入肝以平風入脾以勝濕入心而主宰血脈之流行所以主之久服輕身耐老者著其扶陽之效也張隱菴曰此物生苗一莖直上有風不動無風自動故名獨活後人以獨活而出於西羌者名羌活出於中國處處有者名獨活今觀肆中所市竟是二種有云羌活主上獨活主下是不可解也升麻氣味甘平苦微寒無毒主解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡久服不夭輕身長年張隱菴曰升麻氣味甘苦平甘者土也苦者火也主從中土而達太陽之氣太陽標陽本寒故微寒蓋太陽稟寒水之氣而行於膚表如天氣之下連於水也太陽在上則天日當空光明清湛清湛故主解百毒光明故殺百精老物殃鬼太陽之氣行於膚表故闢瘟疫瘴氣邪氣太陽之氣行於地中故蠱毒入口皆吐出治蠱毒則中惡腹痛自除闢瘟疫瘴氣邪氣則時氣毒癘頭痛寒熱自散寒水之氣滋於外而濟於上故治風腫諸毒喉痛口瘡久服則陰精上滋故不夭陽氣盛故輕身陰陽充足則長年矣嘗考凡物紋如車輻者皆有升轉循環之用防風秦艽烏藥防己木通升麻皆紋如車輻而升麻更覺空通所以升轉甚捷也茵陳蒿氣味苦平微寒無毒主風濕寒熱邪氣熱結黃疸久服輕身益氣耐老面白悅長年白兔食成仙張隱菴曰經云春三月此為發陳茵陳因舊苗而春生蓋因冬令寒水之氣而具陽春生髮之機主治風濕寒熱邪氣得生陽之氣則外邪自散也結熱黃疸得水寒之氣則內熱自除也久服則生陽上升故輕身益氣耐老因陳而生新故面白悅長年兔乃純陰之物喜食陽春之氣故白兔食之成仙甘菊花氣味苦平無毒主諸風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹久服利血氣輕身耐老延年徐靈胎曰凡芳香之物皆能治頭目肌表之疾但香則無不辛燥者惟菊得天地秋金清肅之氣而不甚燥烈故於頭目風火之疾尤宜焉龍膽氣味苦澀大寒無毒主骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒張隱菴曰龍乃東方之神膽主少陽甲木苦走骨故主骨間寒熱澀類酸故除驚癇邪氣膽主骨肝主筋故續絶傷五臟六腑皆取決於膽故定五臟山下有風曰蠱風氣升而蠱毒殺矣紫蘇氣味辛微溫無毒主下氣殺穀除飲食闢口臭去邪毒辟惡氣久服通神明輕身耐老述紫蘇氣微溫稟天之春氣而入肝味辛得地之金味而入肺主下氣者肺行其治節之令也殺穀除飲食者氣溫達肝肝疏暢而脾亦健運也闢口臭去邪毒辟惡氣者辛中帶香香為天地之正氣香能勝臭即能解毒又能勝邪也久服則氣爽神清故通神明輕身耐老其子下氣尤速其梗下氣寬脹治噎膈反胃止心痛旁小枝通十二經關竅脈絡藕實莖氣味甘平主補中養神益氣力除百疾久服輕身耐老不飢延年雞頭實氣味甘平主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙黑脂麻氣味甘平無毒主傷中虛羸補中五內益氣力生長肌肉填髓腦久服輕身不老色黑者良益母草子氣味辛甘微溫無毒主明目益精除水氣久服輕身延年今人奉為女科專藥往往誤事且其獨具之長反掩茜草氣味苦寒無毒主寒濕風痹黃疸補中陳修園曰氣味苦寒者得少陰之氣化也風寒濕三氣合而為痹而此能入足少陰俾上下交通而旋轉則痹自愈矣上下交通則中土自和斯有補中之效矣中土和則濕熱之氣自化而黃疸愈矣又素問以蘆茹一兩烏鰂魚骨四兩丸以雀卵飲以鮑魚汁治氣竭肝傷脫血血枯婦人血枯經閉丈夫陰痿精傷名曰四烏鰂骨一蘆茹丸蘆茹即茜草也亦取其入少陰以生血補中宮以統血汁可染絳似血而能行血歟後人以此三味入烏骨白絲毛雞腹內以陳酒童便煮爛烘乾為丸以百勞水下五七十丸治婦人倒經血溢於上男子咳嗽吐血左手關脈弦背上畏寒有淤血者茯苓氣味甘平無毒主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服安魂養神不飢延年陳修園曰茯苓氣平入肺味甘入脾肺能通調脾能轉輸其功在於利小便一語胸為肺之部位脅為肝之部位其氣上逆則憂恚驚邪恐悸七情之用因而弗調心下為太陽之部位水邪停留則結痛水氣不化則煩滿凌於太陰則咳逆客於營衛則發熱惡寒內有宿飲則津液不升為口焦舌乾唯得小便一利則水行而氣化諸疾俱愈矣久服安魂養神不飢延年者以肺金為天脾土為地位一身之天地而明其上下交和之效也豬苓氣味甘平無毒主痎瘧解毒蠱疰不祥利水道久服輕身耐老陳修園曰豬苓氣平稟金氣而入肺味甘無毒得土味而入脾肺主治節脾主轉輸所以能利水道又考此物出土時帶甘久則淡然無味無味則歸於膀胱膀胱為太陽其說有二一曰經絡之太陽一日六氣之太陽何謂經絡之太陽其腑在下而主水得上焦肺氣之化中焦脾氣之運則下焦愈治所謂上焦如霧中焦如漚下焦如瀆俾決瀆之用行於州都則州都中自有云行雨施之景象利水如神有由來也且不獨利水道也六氣之太陽名曰巨陽應天道居高而衛外乃君心之藩籬也凡風寒初感無非先入太陽之界治不得法則留於膜原而為瘧久則為痎即傷寒雜病似瘧非瘧者皆在此例但得豬苓之通利水道水行氣化水精四布溱溱汗出則營衛和而諸邪俱解仲景五苓散桂枝去桂加茯苓白朮湯非於此得其悟機乎若陽明之渴欲飲水小便不利少陰之咳嘔而渴心煩不眠熱瘧多兼此症總於利水道中布達太陽之氣使天水循環滋其枯燥即仲景豬苓湯之義也且太陽為天光明清湛清湛則諸毒可解光明則蠱疰不驅自除又云久服輕身耐老者溺得陽氣之化而始長溺出不能遠射陽氣衰於下也溺出及溺已時頭搖者頭為諸陽之會從下以驗其上之衰也此皆老態得豬苓助太陽之氣而可耐之然此特聖人開太陽之治法非謂豬苓平淡之可賴也牡桂氣味辛溫無毒主上氣咳逆結氣喉痹吐吸利關節補中益氣久服通神輕身不老牡陽也牡桂者即今之桂枝桂皮也菌根也菌桂即今之肉桂厚桂也然生髮之機在枝幹故仲景方中所用俱是桂枝即牡桂也時醫以桂枝發表禁不敢用而所用肉桂又必刻意求備皆是為施治不愈卸罪巧法張隱菴曰桂本凌冬不凋氣味辛溫其色紫赤水中所生之木火也肺腎不交則為上氣咳逆之證桂啓水中之生陽上交於肺則上氣平而咳逆除矣結氣喉痹者三焦之氣不行於肌腠則結氣而為喉痹桂稟少陽之木氣通利三焦則結氣通而喉痹可治矣吐吸者吸不歸根即吐出也桂能引下氣與上氣相接則吸之氣直至丹田而後入故治吐吸也關節者兩肘兩腋兩髀兩膕皆機關之室周身三百六十五節皆神氣之周行桂助君火之氣使心主之神氣出入於機關遊行於骨節故利關節也補中益氣者補中焦而益上下之氣也久服則陽氣盛而光明故通神明三焦通會元真於肌腠故輕身不老徐忠可曰近來腎氣丸十全大補湯俱用肉桂蓋雜溫暖於滋陰藥中故無礙至桂枝湯因作傷寒首方又因有春夏禁用桂枝之說後人除有汗發熱惡寒一證他證即不用甚至春夏則更守禁藥不敢用矣不知古人用桂枝取其宣通血氣為諸藥嚮導即腎氣丸古亦用桂枝其意不止於溫下也他如金匱論虛損十方而七方用桂枝孕妊用桂枝湯安胎又桂苓丸去症産後中風面赤桂枝附子竹葉並用産後乳子煩亂嘔逆用竹皮大丸內加桂枝治熱煩又附方於建中加當歸內補然則桂枝豈非通用之藥若肉桂則性熱下達非下焦虛寒者不可用而人反以為通用宜其用之而多誤矣余自究心金匱以後其用桂枝取效變幻出奇不可方物聊一拈出以破時人之惑陳修園曰金匱謂氣短有微飲宜從小便出之桂苓甘術湯主之腎氣丸亦主之喻嘉言注呼氣短宜用桂苓甘術湯以化太陽之氣吸氣短宜用腎氣丸以納少陰之氣二方俱借桂枝之力市醫不曉也第桂枝為上品之藥此時卻蹇於遇而善用桂枝之人亦與之同病癸亥歲司馬公之媳孀居數載性好靜長日閉戶獨坐得咳嗽病服生地麥冬百合之類一年餘不效延余診之脈細小而弦緊純是陰霾四布水氣滔天之象斷為水飲咳嗽此時若不急治半月後水腫一作盧扁莫何言之未免過激診一次後即不復與商嗣腫病大作醫者用檳榔牽牛葶藶子厚朴大腹皮蘿蔔子為主加焦白朮熟地炭肉桂附子茯苓車前子牛膝當歸芍藥海金砂澤瀉木通赤小豆商陸豬苓枳殼之類出入加減計服二個月其腫全消人瘦如柴下午氣陷腳腫次早亦消見食則嘔冷汗時出子午二時煩躁不寧咳嗽輒暈醫家以腫退為效而病人時覺氣散不能自支又數日大汗嘔逆氣喘欲絶又延余診之脈如吹毛指甲黯四肢厥冷余驚問其少君曰前此直言獲咎以致今日病不可為余實不能辭其責也但尊大人於庚申夏間將入都沾恙一月余進藥三劑全愈迄今三載尚守服舊方精神逾健豈遂忘耶茲兩次遵命而來未准一見此症已束手無策未知有何面諭渠少君云但求氣喘略平所以然者非人力也余不得已以金匱桂苓甘術湯小劑應之茯苓二錢白朮桂枝炙甘草各一錢次日又延余知術拙不能為力固辭之別延醫治後一曰歿旋聞醫輩私議桂苓甘術湯為發表之劑於前證不宜夫桂苓甘術湯豈發表劑哉只緣湯中之桂枝一味由來被謗余用桂枝宜其招謗也噫桂枝之屈於不知己將何時得以大申其用哉桂枝性用自唐宋以後罕有明其旨者叔父引張隱菴注字字精確又引徐忠可之論透發無遺附録近日治案幾於痛哭垂涕而道之其活人無己之心溢於筆墨之外吾知桂枝之功用從此大彰矣又按仲景書桂枝條下有去皮二字葉天士醫林指南方中每用桂枝末甚覺可笑蓋仲景所用之桂枝只取梢尖嫩枝內外如一若有皮骨者去之非去枝上之皮也諸書多未言及特補之受業侄鳳騰鳴岐注菌桂氣味辛溫無毒主百病養精神和顏色為諸藥先通聘使久服輕身不老面生光華媚好常如童子陳修園曰性用同牡桂養精神者內能通達臟腑也和顏色者外能通利血脈也為諸藥先通聘使者辛香能分達於經絡故主百病也與牡桂有輕重之分上下之別凡陰邪盛與藥相拒者非此不能入橘皮氣味苦辛溫無毒主胸中瘕熱逆氣利水穀久服去臭下氣通神陳修園曰橘皮氣溫稟春氣而入肝味苦入心味辛入肺胸中為肺之部位唯其入肺所以主胸中之瘕熱逆氣疏泄為肝之專長唯其入肝所以能利水穀心為君主之官唯其入心則君火明而濁陰之臭氣自去又推其所以得效之神者皆其下氣之功也總結上三句古人多誤解又曰橘皮筋膜似脈絡皮形似肌肉宗眼似毛孔人之傷風咳嗽不外肺經肺主皮毛風之傷人先於皮毛次入經絡而漸深治以橘皮之苦以降氣辛以發散俾從脾胃之大絡而外轉於肌肉毛孔之外微微從汗而解也若削去筋膜只留外皮名曰橘紅意欲解肌止嗽不知汗本由內而外豈能離肌肉經絡而直走於外雷斆去白留白之分東垣因之何不通之甚也至於以橘皮製造為醬更屬無知妄作查其製法橘皮用水煮三次極爛嚼之無辛苦味曬乾外用甘草麥冬青鹽烏梅元明粉硼砂熬濃汁浸曬多次以汁干為度又以人參貝母研末拌勻收貯數月後用之據云能化痰療嗽順氣止渴生津而不知全失橘皮之功用橘皮治嗽妙在辛以散之今以烏梅之酸收亂之橘皮順氣妙在苦以降之今以麥冬人參甘草之甘壅亂之橘皮妙在溫燥故能去痰寬脹今以麥冬貝母元明硼砂青鹽之鹹寒亂之試問橘皮之本色何在乎余嘗究俗人喜服之由總由入口之時得甘酸之味則滿口生津得鹹寒之性則堅痰暫化一時有驗彼此相傳而陰被其害者不少也法制半夏亦用此藥浸造罨發黃衣收貯貽害則一枸杞氣味苦寒無毒主五內邪氣熱中消渴周麻風濕久服堅筋骨輕身不老耐寒暑陳修園曰枸杞氣寒稟水氣而入腎味苦無毒得火味而入心五內即五臟五臟為藏陰之地熱氣傷陰即為邪氣邪氣伏於中則為熱中熱中則津液不足內不能滋潤臟腑而為消渴外不能灌溉經絡而為周痹熱甚則生風熱鬱則成濕種種相因唯枸杞之苦寒清熱可以統主之久服堅筋骨輕身不老耐寒暑三句則又申言其心腎交補之功以腎字從堅補之即所以堅之也堅則身健而輕自忘老態況腎水足可以耐暑心火寧可以耐寒洵為飲食之上劑然苦寒二字本經概根苗花子而言若單論其子嚴冬霜雪之中紅潤可愛是稟少陰水精之氣兼少陰君火之化為補養心腎之良藥但性緩不可以治大病急病耳木香氣味辛溫無毒主邪氣闢毒疫瘟鬼強志主淋露久服不夢寤魘寐張隱菴曰木香其數五氣味辛溫上徹九天稟手足太陰天地之氣化主交感天地之氣上下相通治邪氣者地氣四散也闢毒疫瘟鬼者天氣光明也強志者天生水水生則腎志強主淋露者地氣上騰氣騰則淋露降天地交感則陰陽和開闔利故久服不夢寤魘寐夢寤者夢中之夢魘寐者寐中之魘也杜仲氣味辛平無毒主腰膝痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝久服輕身耐老參張隱菴杜仲氣味辛平得金之氣味而其皮黑色而屬水是稟陽明少陰金水之精氣而為用也腰為腎府少陰主之膝屬大筋陽明主之杜仲稟少陰陽明之氣故腰膝之痛可治也補中者補陽明之中土也益陰者益少陰之精氣也堅筋骨者堅陽明所屬之筋少陰所主之骨也強志者腎藏志腎氣得補而壯氣壯而志自強也陽明燥氣下行故除陰下濕癢小便餘瀝也久服則水金相生精氣充足故輕身耐老也桑根白皮氣味甘寒無毒主傷中五勞六極羸瘦崩中絶脈補虛益氣舊本列為中品今從崇原葉天士曰桑皮氣寒稟水氣而入腎味甘無毒得土味而入脾中者中州脾也脾為陰氣之原熱則中傷桑皮甘寒故主傷中五勞者五臟勞傷真氣也六極者六腑之氣虛極也臟腑俱虛所以肌肉削而羸瘦也其主之者桑皮甘以固脾氣而補不足寒以清內熱而退火邪邪氣退而脾陰充脾主肌肉自然肌肉豐而勞極愈矣崩中者血脫也脈者血之府血脫故脈絶不來也脾統血而為陰氣之原甘能益脾所以主崩中絶脈也火與元氣勢不兩立氣寒清火味甘益氣氣充火退虛得補而氣受益也陳修園曰今人以補養之藥誤認為清肺利水之品故用多不效且謂生用大瀉肺氣宜塗蜜炙之然此藥忌火不可不知張隱菴曰桑割而復茂生長之氣最盛故補續之功如此桑上寄生氣味苦平無毒主腰痛小兒背強癰腫充肌膚堅發齒長鬚眉安胎張隱菴曰寄生感桑氣而寄生枝節間生長無時不假土力奪天地造化之神效故能資養血脈於空虛之地而取效倍於他藥也主治腰痛者腰乃腎之外候男子以藏精女子以系胞寄生得桑精之氣虛系而生故治腰痛小兒腎形未足似無腰痛之證應有背強癰腫之疾寄生治腰痛則小兒背強癰腫亦能治之充肌膚精氣外達也堅發齒精氣內足也精氣外達而充肌膚則鬚眉亦長精氣內足而堅發齒則胎亦安蓋肌膚者皮肉之餘齒者骨之餘發與鬚眉者血之餘胎者身之餘以餘氣寄生之物而治餘氣之病同類相感如此槐實氣味苦寒主五內邪氣熱止涎唾補絶傷五痔火瘡婦人乳瘕子藏急痛柏實氣味甘平主驚悸平清心經之遊火安五臟滋潤之功益氣壯火食氣火寧則氣益也除風濕痹得秋金之令能燥濕平肝也久服令人潤澤美色耳目聰明滋潤皮膚之諸竅不飢不老輕身延年柏之性不假灌溉而能壽也徐靈胎曰柏得天地堅剛之性以生不與物變遷經冬彌翠故能寧心神斂心氣而不為邪風遊火所侵克也人之生理謂之仁仁藏於心物之生機在於實故實亦謂之仁凡草木之仁皆能養心氣以類相應也大棗氣味甘平無毒主心腹邪氣安中養脾氣平胃氣通九竅助十二經補少氣少津液身中不足大驚四肢重和百藥久服輕身延年陳修園曰大棗氣平入肺味甘入脾肺主一身之氣脾主一身之血氣血調和故有以上諸效朴硝氣味苦寒無毒主治百病除寒熱邪氣逐五臟六腑積聚固結留瘕能化七十種石煉餌服之輕身神仙張隱菴曰雪花六出元精石六稜六數為陰乃水之成數也朴硝硝石面上生牙如圭角作六稜乃感地水之氣結成而稟寒水之氣化是以形類相同但硝石遇火能焰兼得水中之天氣朴硝止稟地水之精不得天氣故遇火不焰也所以不同者如此丹砂氣味甘微寒無毒主身體五臟百病養精神安魂魄益氣明目殺精魅邪惡鬼久服通神明不老陳修園曰丹砂氣微寒入腎味甘無毒入脾色赤入心主身體五臟百病者言和平之藥凡身體五臟百病皆可用而無顧忌也心者身之本神之居也腎者氣之源精之處也心腎交則精神交養隨神往來者謂之魂並精出入者謂之魄精神交養則魂魄自安氣者得之先天全賴後天之穀氣而昌丹砂味甘補脾所以益氣明目者以石藥凝金之氣金能鑑物赤色得火之象火能燭物也殺精魅邪惡鬼者具天地純陽之正色陽能勝陰正能勝邪也久服通神明不老者明其水升火降之效也滑石氣味甘寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣久服輕身耐飢長年按滑石氣寒得寒水之氣入手足太陽味甘入足太陰且其色白兼入手太陰所主諸病皆清熱利水之功也益精延年言其性之循不比他種石藥偏之為害也讀者勿泥紫石英氣味甘溫無毒主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子久服溫中輕身延年陳修園曰紫石英氣溫稟木氣而入肝味甘無毒得土味而入脾咳逆邪氣者以心腹為脾之部位人之呼吸出心肺而入肝腎脾居中而轉運何咳逆之有惟脾虛受肝邪之侮不能下轉而上衝故為是病其主之者溫能散邪甘能和中而其質又重而能降也補不足者氣溫味甘補肝脾之不足也風寒入於子宮則肝血不藏脾血亦不統往往不能生育脾土之成數十所以十年無子也紫石英氣溫可以散子宮之風寒味甘可以補肝脾之血也久服溫中輕身延年者誇其補血納氣之力也按白石英治略同但紫色屬陰主治衝脈血海多在下功白為金色主治消渴兼理上焦之燥赤石脂氣味甘平無毒主黃疸泄痢腸澼膿血陰濁下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五色石脂各隨五色補五臟陳修園曰赤石脂氣平稟金氣味甘得土味手足太陰藥也太陰濕勝在皮膚則為黃疸在腸胃則為泄痢甚則為腸澼膿血下注於前陰則為陰蝕並見赤白帶下下注於後陰則為下血皆濕邪之氣為害也石脂具濕土之質而有燥金之用所以主之癰腫疽痔惡瘡頭瘍疥瘙等證皆濕氣鬱而為熱熱盛生毒之患石脂能燥濕化熱所以主之久服補髓益氣肥健不飢延年者濕去則津生自能補髓益氣補髓助精也益氣助神也精神交會於中土故有肥健不飢輕身延年之效也禹餘糧氣味甘寒無毒主咳逆補中降氣不使以逆寒熱除脾胃濕滯之寒熱非謂可以通治寒熱煩滿性寒除熱即可上止煩質重降逆即可以泄滿下利赤白除濕熱之功血閉癥瘕消濕熱所滯之淤積大熱熱在陽明者熱必甚此能除之煉餌服之不飢其質類穀粉而補脾土所以謂之糧而能充飢也輕身延年補養後天之效按李時珍曰生池澤者為禹餘糧生山谷者為太一餘糧本經雖分兩種而治體則同發髲氣味苦溫無毒主五癃關格不通利小便水道療小兒驚大人痓仍自還神化以皂莢水洗淨復用甘草水洗鹽水洗曬乾入瓶內以鹽土固濟煅存性謂之血餘灰研極細用陳修園曰心主血發者血之餘也屬手少陰心經云腎之合骨也其榮發也屬足少陰腎又云皮毛者肺之合也發亦毛類屬手太陰肺肺為水源小腸為心府故主五癃關格不通水道不利等症調肺氣寧心神除心肺之痰故主小兒癇大人痓等證其曰仍自還神化者謂發為血餘乃水精奉心化血所生今取以煉服仍能入至陰之藏助水精而上奉心臟之神以化其血也後人感於以人補人之說每用紫河車增熱為害十服十死不如用此藥之驗龍骨氣味甘平無毒主心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癇陳修園曰龍得天地純陽之氣凡心腹鬼疰精物皆屬陰氣作祟陽能制陰也肝屬木而得東方之氣肝火乘於上則為咳逆奔於下則為泄痢膿血女子漏下龍骨能斂戢肝火故皆治之且其用變化莫測雖癥瘕堅結難療亦能穿入而攻破之至於驚癇顛痙皆肝氣上逆挾痰而歸迸入心龍骨能斂火安神逐痰降逆故為驚癇顛痙之聖藥仲景風引湯必是熟讀本經從此一味悟出全方而神妙變化亦如龍之莫測余今詳注此品復為點睛欲飛矣痰水也隨火而升龍屬陽而潛於海能引逆上之火與泛濫之水而歸其宅若與牡蠣同用為治痰之神品今人只知其性澀以止脫何其淺也阿膠氣味甘平無毒主心腹內崩勞極灑灑如瘧狀腰腹痛四肢痠疼女子下血安胎久服輕身益氣陳修園曰阿膠以阿井之水入黑驢皮煎煉成膠也內經云手少陰外合於濟水內合於心故能入心又曰皮毛者肺之合也以皮煎膠故能入肺味甘無毒得地中正之土氣故能入脾凡心包之血不能散行經脈下入於腹則為崩墮阿膠入心補血故能治之勞極氣虛皮毛灑灑如瘧狀之先寒阿膠入肺補氣故能治之脾為後天生血之本脾虛則陰血內枯腰腹空痛四肢痠疼阿膠補養脾陰故能治之且血得脾以統所以有治女子下血之效胎以血為養所以有安胎之效血足氣亦充所以有輕身益氣之效也東阿井在山東兗州府陽穀縣東北六十里即古之東阿縣也此清濟之水伏行地中歷千里而發於此井其水較其旁諸水重十之一二不等人之血脈宜伏而不宜見宜沉而不宜浮以之制膠正與血脈相宜也必用黑皮者以濟水合於心黑色屬於腎取水火相濟之義也所以妙者驢亦馬類屬火而動風肝為風臟而藏血今借驢皮動風之藥引入肝經又取阿水沉靜之性靜以制動俾風火熄而陰血生逆痰降此本經性與天道之言得聞文章之後猶難語此況其下乎白膠氣味甘平無毒主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎久服輕身延年陳修園曰白膠即鹿角煎熬成膠何以本經白膠列為上品鹿茸列為中品乎蓋鹿茸溫補過峻不如白膠之甘平足貴也功用略同不必再釋其主婦人血閉止痛安胎者皆補衝脈血海之功也輕身延年者精足血滿之效也牛黃氣味苦平主驚癇寒熱熱盛狂痓除邪逐鬼麝香氣味辛溫無毒主辟惡氣殺鬼精物去諸蟲蟲毒溫瘧驚癇久服除邪不夢寤魘寐參麝食柏葉香草及蛇蟲其香在臍為諸香之冠香者天地之正氣也故能辟惡而殺毒香能通達經絡故能逐心竅凝痰而治驚癇驅募原邪氣以治溫瘧而魘寐之症當熟寐之頃心氣閉塞而成麝香之香氣最盛令閉者不閉塞者不塞則無此患矣孕婦忌之石蜜氣味甘平無毒主心腹邪氣諸驚癇痓安五臟諸不足益氣補中止痛解毒除衆病和百藥久服強志輕身不飢不老陳修園曰石蜜氣平稟金氣而入肺味甘無毒得土味而入脾心腹者自心下以及大小腹與脅肋而言也邪氣者六淫之氣自外來七情之氣自內起非固有之氣即邪氣也其主之者甘平之用也諸驚癇痓者厥陰風木之為病也其主之者養胃和中所謂厥陰不治取之陽明是也脾為五臟之本脾得補而安則五臟俱安而無不足之患矣真氣者得於天而充於谷味甘益脾即所以益氣而補中也止痛者味甘能緩諸急解毒者氣平能勝諸邪也諸花之精華採取不遺所以能除衆病諸花之氣味醞釀合一所以能和百藥也久服強志輕身不飢不老者皆調和氣血補養精神之驗也龜板氣味甘平無毒主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合久服輕身不飢陳修園曰龜甲諸傢俱說大補真水為滋陰第一神品而自余視之亦不盡然大抵介蟲屬陰皆能除熱生於水中皆能利濕其甲屬金皆能攻堅此外亦無他長本經云主治漏下赤白者以濕熱為病熱勝於濕則漏下赤色濕勝於熱則漏下白色龜甲專除濕熱故能治之破癥瘕者其甲屬金金能攻堅也痎瘧老瘧也瘧久不愈濕熱之邪痼結陰分唯龜甲能入陰分而攻之也火結大腸則生五痔濕濁下注則患陰蝕肺合大腸腎主陰産龜甲性寒以除其熱氣平以消其濕也脾主四肢因濕成痹以致重弱龜居水中性能勝濕甲屬甲胄質主堅強故能健其四肢也小兒囟骨不合腎虛之病龜甲主骨故能合之也久服輕身不飢者言陰精充足之效也牡蠣氣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白久服強骨節殺邪鬼延年按補陰則生搗用若煅過則成灰不能補陰矣方書注云煅用者皆取粉外治之法荒經者誤收遂相沿不改矣陳修園曰牡蠣氣平者金氣也入手太陰肺經微寒者寒水之氣也入膀胱經味鹹者真水之味也入足少陰腎經此物得金水之性凡病起於太陽皆名曰傷寒傳入少陽之經則為寒熱往來其主之者借其得秋金之氣以平木火之遊行也溫瘧者但熱不寒之瘧疾為陽明經之熱病灑灑者即陽明白虎證中背微寒惡寒之義火欲發而不能徑達也主以牡蠣者取其得金之氣以解炎暑之苛白虎湯命名亦同此意也驚恚怒氣其主在心其發在肝牡蠣氣平得金之用以制木味鹹得水之用以濟火也拘者筋急緩者筋緩為肝之病鼠瘻即瘰癧之別名為三焦膽經火鬱之病牡蠣之平以制風寒以勝火咸以耎堅所以咸主之止帶下赤白與強骨節二句其義互見於龜板注中不贅殺鬼邪者補肺而申其清肅之威能延年者補腎而得其益精之效也桑螵蛸氣味鹹平主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道陳修園曰螵蛸螳螂之子也氣平屬金味鹹屬水螳螂於諸蟲中其性最剛以其具金性能使肺之治節申其權故主疝瘕女子血閉通五淋利水道也又具水性能使腎之作強得其用故主陰痿益精生子腰痛也其主傷中者以其生於桑上得桑氣而能續傷也今人專取其縮小便雖曰能開而亦能闔然要其本性在此而不在彼
