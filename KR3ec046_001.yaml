body:
  text: 卷之一上品人參氣味甘微寒無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年陳修園曰本經止此三十七字其提綱云主補五臟以五臟屬陰也精神不安魂魄不定驚悸不止目不明心智不足皆陰虛為陽亢所擾也今五臟得甘寒之助則為定之安之止之明之開之益之之效矣曰邪氣者非指外邪而言乃陰虛而壯火食氣火即邪氣也今五臟得甘寒之助則邪氣除矣余細味經文無一字言及溫補回陽故仲景於汗吐下陰傷之證用之以救津液而一切回陽方中絕不加此陰柔之品反緩薑附之功故四逆湯通脈四逆湯為回陽第一方皆不用人參而四逆加人參湯以其利止亡血而加之也茯苓四逆湯用之者以其在汗下之後也今人輒云以人參回陽此說倡自宋元以後而大盛於薛立齋張景岳李士材輩而李時珍本草綱目尤為雜沓學者必於此等書焚去方可與言醫道仲景一百一十三方中用人參者只有一十七方新加湯小柴胡湯柴胡桂枝湯半夏瀉心湯黃連湯生薑瀉心湯旋覆代赭石湯乾薑黃芩黃連人參湯厚朴生薑半夏人參湯桂枝人參湯四逆加人參湯茯苓四逆湯吳茱萸湯理中湯白虎加人參湯竹葉石膏湯炙甘草湯皆是因汗吐下之後亡其陰津取其救陰如理中吳茱萸湯以剛燥劑中陽藥太過取人參甘寒之性養陰配陽以臻於中和之妙也又曰自時珍之綱目盛行而神農之本草經遂廢即如人參本經明說微寒時珍說生則寒熟則溫附會之甚蓋藥有一定之性除是生搗取汁冷服與蒸曬八九次色味俱變者頗有生熟之辨若入煎劑則生者亦熟矣況寒熱本屬冰炭豈一物蒸熟不蒸熟間遂如許分別乎嘗考古聖用參之旨原為扶生氣安五臟起見而為五臟之長百脈之宗司清濁之運化為一身之橐龠者肺也人參惟微寒清肺肺清則氣旺氣旺則陰長而五臟安古人所謂補陽者即指其甘寒之用不助壯火以食氣而言非謂其性溫補火也陶弘景謂功用同甘草凡一切寒溫補瀉之劑皆可共濟成功然甘草功兼陰陽故本經云主五臟六腑人參功專補陰故本經云主五臟仲景於咳嗽病去之者亦以形寒飲冷之傷非此陰寒之品所宜也黃耆氣味甘微溫無毒主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病生用鹽水炒酒炒醋炒蜜炙白水炒陳修園曰黃耆氣微溫稟少陽之氣入膽與三焦味甘無毒稟太陰之味入肺與脾其主癰疽者甘能解毒也久敗之瘡肌肉皮毛潰爛必膿多而痛甚黃耆入脾而主肌肉入肺而主皮毛也大風者殺人之邪風也黃耆入膽而助中正之氣俾神明不為風邪亂入三焦而助決瀆之用俾竅道不為風所壅入脾而救受克之傷入肺而制風木之動所以主之癩疾又名大麻風即風毒之甚也五痔者五種之痔瘡乃少陽與太陰之火陷於下而此能舉其陷鼠瘻者瘰癧之別名乃膽經與三焦之火鬱於上而此能散其鬱也其曰補虛者是總結上文諸證久而致虛此能補之非泛言補益之品也葉天士云小兒稚陽也稚陽為少陽少陽生氣條達則不病所以概主小兒百疾也余細味經文俱主表症而言如六黃湯之寒以除熱熱除則汗止耆附湯之溫以回陽陽回則汗止玉屏風散之散以驅風風平則汗止諸方皆借黃耆走表之力領諸藥而速達於表而止汗非黃耆自能止汗也諸家固表及生用發汗炒用止汗等說貽誤千古茲特正之白朮氣味甘溫無毒主風寒濕痹死肌痙疸止汗除熱消食作煎餌久服輕身延年不飢仲景有赤朮即蒼朮也功用略同偏長於消導汗多者大忌之陳修園曰此為脾之正藥其曰風寒濕痹者以風寒濕三氣合而為痹也三氣雜至以濕氣為主死肌者濕浸肌肉也痙者濕流關節也疸者濕鬱而為熱熱則發黃也濕與熱交蒸則自汗而發熱也脾受濕則失其健運之常斯食不能消也白朮功在除濕所以主之作藥餌三字另提先聖大費苦心以白朮之功用在燥而所以妙處在於多脂張隱菴云土有濕氣始能灌溉四旁如地得雨露始能發生萬物今以生術削去皮急火炙令熟則味甘溫而質滋潤久服有延年不飢之效可見今人炒燥炒黑土蒸水漂等制大失經旨甘草氣味甘平無毒主五臟六腑寒熱邪氣堅筋骨長肌肉倍氣力金瘡尰解毒久服輕身延年生用清火炙用補中陳修園曰物之味甘者至甘草為極甘主脾脾為後天之本五臟六腑皆受氣焉臟腑之本氣則為正氣外來寒熱之氣則為邪氣正氣旺則邪氣自退也筋者肝所主也骨者腎所主也肌肉者脾所主也氣者肺所主也力者心所主也但使脾氣一盛則五臟皆循環受益而皆得其堅之長之倍之之效矣金瘡者為刀斧所傷而成瘡瘡甚而腫脾得補而肉自滿也能解毒者如毒物入土則毒化也土為萬物之母土健則輕身延年也薯蕷氣味甘平無毒主傷中補虛羸除寒熱邪氣補中益氣力長肌肉強陰久服耳目聰明輕身不飢延年陳修園曰此藥因唐代宗名蕷避諱改為山藥山藥氣平入肺味甘無毒入脾脾為中州而統血血者陰也中之守也唯能益血故主傷中傷中愈則肌肉豐故補虛羸肺主氣氣虛則寒邪生脾統血血虛則熱邪生血氣充而寒熱邪氣除矣脾主四肢脾血足則四肢健肺主氣肺氣充則氣力倍也且此物生搗最多津液而稠黏又能補腎而填精精足則強陰目明耳聰不飢是脾血之旺輕身是肺氣之充延年是誇其補益之效也凡上品俱是尋常服食之物非治病之藥故神農另提出久服二字可見今人每服上品之藥如此物及人參熟地葳蕤阿膠菟絲子沙苑蒺藜之類合為一方以治大病誤人無算蓋病不速去元氣日傷傷及則死凡上品之藥法宜久服多則終身少則數年與五穀之養人相佐以臻壽考若大病而需用此藥如五穀為養脾第一品脾虛之人強令食谷即可畢補脾之能事有是理乎然操此技者未有不得盛名薛立齋張景岳馮楚瞻輩倡之於前而近日之東延西請日診百人者無非是術誠可慨也肉蓯蓉氣味甘微溫無毒主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕久服輕身陳修園曰肉蓯蓉是馬精落地所生取治精虛者同氣相求之義也凡五勞七傷久而不愈未有不傷其陰者蓯蓉補五臟之精精足則陰足矣莖中者精之道路精虛則寒熱而痛精足則痛已矣又滑以去著精生於五臟而藏之於腎精足則陽舉精堅令人多子矣婦人癥瘕皆由血淤精足則氣充氣充則淤行也葉天士注癥瘕之謂其咸以耎堅滑以去著溫以散結猶淺之乎測蓯蓉也張隱菴曰馬為火畜精屬水陰蓯蓉感馬精而生其形似肉氣味甘溫蓋稟少陰水火之氣而歸於太陰坤土之藥也土性柔和故有蓯蓉之名地黃氣味甘寒無毒主折跌絕筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹生者尤良久服輕身不老參葉天士地黃氣寒入足少陰腎經味甘無毒入足太陰脾經氣味重濁陰也陰者中之守也傷中者守中真陰傷也地黃甘寒補中焦之精汁所以主之血痹者血虛閉而不運也地黃味甘以滋脾血氣寒以益腎氣氣血行而閉者開矣腎主骨益腎則水足而骨髓充脾主肌肉潤脾則土滋而肌肉豐也作湯除寒熱積聚者湯者蕩也或寒或熱之積聚湯能蕩之也蓋味甘可以緩急性滑可以去著也又曰除痹者言不但逐血痹更除皮肌筋骨之痹也除皮肉筋骨之痹則折跌絕筋亦可療矣久服輕身不老以先後二天交換元氣與穀氣俱納也生者尤良謂其本性俱在也陳修園曰地黃本經名地髓爾雅名芐又名芑唐以後幾蒸幾曬為熟地黃苦味盡除入於溫補腎經丸劑頗為相宜若入湯劑及養血涼血等方甚屬不合蓋地黃專取其性涼而滑利流通熟則膩滯不涼全失其本性矣徐靈胎辨之甚詳無如若輩竟執迷不悟也又曰百病之極窮必及腎及腎危證也有大承氣湯之急下法有桃花湯之溫固法有四逆湯白通湯之回陽法有豬苓湯黃連雞子黃湯之救陰法有真武湯之行水法有附子湯之溫補法皆所以救其危也張景岳自創邪說以百病之生俱從腎治誤以神農本經上品服食之地黃認為治病之藥內經云五穀為養五果為助五菜為充毒藥攻邪神農所列上品多服食之品即五穀五果五菜之類也玩久服二字可見聖人藥到病瘳何以云久服凡攻邪以去病多取毒藥滋潤膠黏反引邪氣斂存於少陰而無出路以後雖服薑附不熱服芩連不寒服參術不補服硝黃不下其故何哉蓋以熟地黃之膠黏善著女人有孕服四物湯為主隨證加入攻破之藥而不傷以四物湯中之熟地黃能護胎也知其護胎之功便可悟其護邪之害膠黏之性最善著物如油入面一著遂不能去也凡遇有邪而誤用此藥者百藥不效病家不咎其用熟地黃之害反以為曾用熟地黃而猶不效者定為敗症豈非景岳之造其孽哉天門冬氣味苦平無毒主諸暴風濕偏痹強骨髓殺三蟲去伏屍久服輕身益氣延年不飢參天門冬稟寒水之氣而上通於天故有天冬之名主治諸暴風濕偏痹者言風濕之邪暴中於人身而成半身不遂之偏痹天冬稟水天之氣環轉運行故可治也強骨髓者得寒水之精也三蟲伏屍皆濕熱所化天冬味苦可以祛濕氣平可以清熱濕熱下逐三尸伏蟲皆去也太陽為諸陽主氣故久服輕身益氣天氣通貫於地中故延年不飢張隱菴曰天麥門冬皆稟少陰水精之氣麥門冬稟水精而上通於陽明天門冬稟水精而上通於太陽夫冬主閉藏門主開轉咸名門冬者咸能開轉閉藏而上達也後人有天門冬補中有瀉麥門冬瀉中有補之說不知何處引來良可嘆也麥門冬氣味甘平無毒主心腹結氣傷中傷飢胃脈絕羸瘦短氣久服輕身不老不飢張隱菴曰麥冬本橫生根顆連絡有十二枚者有十四枚者有十五六枚者蓋合於人身十二絡加任之屏翳督之長強為十四絡又加脾之大絡名大包共十五絡又加胃之大絡名虛里共十六絡唯聖人能體察之用之以通脈絡並無去心二字後人不詳經義不窮物理相沿去心久矣今特表正之經云主心腹結氣傷中傷飢胃絡脈絕者以麥冬根顆連絡不斷能通達上下四旁令結者解傷者復絕者續皆借中心之貫通也又主羸瘦短氣者補胃自能生肌補腎自能納氣也久服輕身不老不飢者先天與後天俱足斯體健而耐飢矣崇原曰麥冬氣味甘平質性柔潤凌冬青翠蓋稟少陰冬水之精與陽明胃土相合又曰凡物之涼者其心必熱熱者陰中之陽也人但知去熱而不知用陽得其陽而後能通陰中之氣細辛氣味辛溫無毒主咳逆上氣頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅輕身長年張隱菴曰細辛氣味辛溫一莖直上其色赤黑稟少陰泉下之水陰而上交於太陽之藥也少陰為水臟太陽為水腑水氣相通行於皮毛內合於肺若循行失職則病咳逆上氣而細辛能治之太陽之脈起於目內眥從巔絡腦若循行失職則病頭痛腦動而細辛亦能治之太陽之氣主皮毛少陰之氣主骨髓少陰之氣不合太陽則風濕相侵痹於筋骨則百節拘攣痹於腠理則為死肌而細辛皆能治之其所以能治之者以氣勝之也久服明目利九竅者水精之氣濡於空竅也九竅利則輕身而延年矣又曰宋元佑陳承謂細辛單用末不可過一錢多則氣閉不通而死近醫多以此語忌用而不知辛香之藥豈能閉氣上品無毒之藥何不可多用方書之言類此者不少學者不詳察而遵信之伊黃之門終身不能入矣柴胡氣味苦平無毒主心腹腸胃中結氣飲食積聚寒熱邪氣推陳致新久服輕身明目益精按經文不言發汗仲聖用至八兩之多可知性純不妨多服功緩必須重用也葉天士曰柴胡氣平稟天中正之氣味苦無毒得地炎上之火味膽者中正之官相火之府所以獨入足少陽膽經氣味輕升陰中之陽乃少陽也其主心腹腸胃中結氣者心腹腸胃五臟六腑也臟腑共十二經凡十一臟皆取決於膽柴胡輕清升達膽氣膽氣條達則十一臟從之宣化故心腹腸胃中凡有結氣皆能散之也其主飲食積聚者蓋飲食入胃散精於肝肝之疏散又借少陽膽為生髮之主也柴胡升達膽氣則肝能散精而飲食積聚自下矣少陽經行半表半裡少陽受邪邪並於陰則寒邪並於陽則熱柴胡和解少陽故主寒熱之邪氣也春氣一至萬物俱新柴胡得天地春升之性入少陽以生氣血故主推陳致新也久服清氣上行則陽氣日強所以輕身五臟六腑之精華上奉所以明目清氣上行則陰氣下降所以益精精者陰氣之英華也黃連氣味苦寒無毒主熱氣目痛眥傷淚出明目腸澼腹痛下痢婦人陰中腫痛久服令人不忘陳修園曰黃連氣寒稟天冬寒水之氣入足少陰腎味苦無毒得地南方之火味入手少陰心氣水而味火一物同具故能除水火相亂而為濕熱之病其云主熱氣者除一切氣分之熱也目痛眥傷淚出不明皆濕熱在上之病腸澼腹痛下痢皆濕熱在中之病婦人陰中腫痛為濕熱在下之病黃連除濕熱所以主之久服令人不忘者苦入心即能補心也然苦為火之本味以其味之苦而補之而寒能勝火即以其氣之寒而瀉之千古唯仲景得本經之秘金匱治心氣不足而吐血者取之以補心傷寒寒熱互結心下而痞滿者取之以瀉心厥陰之熱氣撞心者合以烏梅下利後重者合以白頭翁等法真信而好古之聖人也防風氣味甘溫無毒主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痛身重久服輕身陳修園曰防風氣溫稟天春術之氣而入肝味甘無毒得地中土之味而入脾主大風三字提綱詳於巴戟天注不贅風傷陽位則目盲無所見風行周身者經絡之風也骨節疼痛者關節之風也身重者病風而不能蹻捷也防風之甘溫發散可以統主之然溫屬春和之氣入肝而治風尤妙在甘以入脾培土以和水氣其用獨神此理證之易象於剝復二卦而可悟焉兩土同崩則剝故大敗必顧脾胃土木無忤則復故病轉必和肝脾防風驅風之中大有回生之力李東垣竟目為卒伍卑賤之品真門外漢也續斷氣味苦微溫無毒主傷寒補不足金瘡癰瘍折跌續筋骨婦人乳難久服益氣力參此以形為治續斷有肉有筋如人筋在肉中之象而色帶紫帶黑為肝腎之象氣味苦溫為少陰陽明火土之氣化故寒傷於經絡而能散之癰瘍絡於經絡而能療之折跌筋骨有傷而能補不足續其斷絕以及婦人乳難而能通其滯而為乳益氣力者亦能強筋骨之功也牛膝氣味苦酸平無毒主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎久服輕身耐老陳修園曰牛膝氣平稟金氣而入肺味苦得火味而入心包味酸得木味而入肝唯其入肺則能通調水道而寒濕行胃熱清而痿愈矣唯其入肝肝藏血而養筋則拘攣可愈膝亦不痛而能屈伸矣唯其入心包苦能泄實則血因氣凝之病可逐也苦能瀉火則熱湯之傷與火傷之爛可完也苦味本伐生生之氣而又合以酸味而遂大申其湧泄之權則胎無不墮矣久服輕身耐老者又統言其流通血脈之功也巴戟天氣味甘微溫無毒主大風邪氣陰痿不起強筋骨安五臟補中增志益氣酒焙陳修園曰巴戟天氣微溫稟天春升之木氣而入足厥陰肝味辛甘無毒得地金土二味入足陽明燥金胃雖氣味有木土之分而其用則統歸於溫肝之內佛經以風輪主持大地即是此義本經以主大風三字提綱兩見一見於巴戟天一見於防風陰陽造化之機一言逗出金匱云風能生萬物亦能害萬物防風主除風之害巴戟天主得風之益不得滑口讀去蓋人居大塊之中乘氣以行鼻息呼吸不能頃刻去風風即是氣風氣通於肝和風生人疾風殺人其主大風者謂其能化疾風為和風也邪氣者五行正氣不得風而失其和木無風則無以遂其條達之情火無風則無以遂炎上之性金無風則無以成其堅勁之體水無風則潮不上土無風則植不蕃一得巴戟天之用則到處皆春而邪氣去矣邪氣去而五臟安自不待言也況肝之為言敢也肝陽之氣行於宗筋而陰痿起行於腎臟腎存志而志增腎主骨而骨強行於脾臟則震坤合德土木不害而中可補益氣二字又總結通章之義氣即風也逐而散之風散則為氣散生而亦死益而和之氣和即為風和死可回生非明於生殺消長之道者不可以語此也葉天士云淫羊藿治陰虛陰痿巴戟天治陽虛陰痿石斛氣味甘平無毒主傷中除痹下氣補五臟虛勞羸瘦強陰益精久服厚腸胃葉天士曰石斛氣平入肺味甘無毒入脾甘平為金土之氣味入足陽明胃手陽明大腸陰者中之守也陰虛則傷中甘平益陰故主傷中痹者脾病也風寒濕三氣而脾先受之石斛甘能補脾故能除痹上氣肺病也火氣上逆則為氣喘石斛平能清肺故能下氣五臟皆屬於陰而脾名至陰為五臟之主石斛補脾而蔭及五臟則五臟之虛勞自復而肌肉之消瘦自生矣陰者宗筋也精足則陰自強精者陰氣之精華也納穀多而精自儲腸者手陽明大腸也胃者足陽明胃也陽明屬燥金久服甘平清潤則陽明不燥而腸胃厚矣新訂張隱菴曰石斛生於石上得水長生是稟水面之專精而補腎味甘色黃不假土力是奪中土之氣化而補脾斛乃量名主出主入能運行中土之氣而愈諸病也澤瀉氣味甘寒無毒主風寒濕痹乳難養五臟益氣力肥健消水久服耳目聰明不飢延年輕身面生光能行水上陳修園曰澤瀉氣寒水之氣也味甘無毒土之味也生於水而上升能啟水陰之氣上滋中土也其主風寒濕痹者三氣以濕為主此能啟水氣上行而復下其痹即從水氣而化矣其主乳難者能滋水精於中土而為汁也其主養五臟益氣力肥健等句以五臟主藏陰而脾為五臟之原一得水精之氣則能灌溉四旁俾五臟循環而受益不特肥健消水不飢見本臟之功而肺得水精之氣而氣益腎得水精之氣而耳聰且形得水精之氣而全體輕色得水精之氣而面生光輝一生得水精之氣而延年所以然者久服之功能行在下之水而使之上也此物形園一莖直上無下行之性故其功效如此今人以鹽水拌炒則反掣其肘矣五味子氣味酸溫無毒主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精陳修園曰五味子氣溫味酸得東方生長之氣而主風人在風中而不見風猶魚在水中而不見水人之鼻息出入頃刻離風則死可知人之所以生者風也風氣通於肝即人身之木氣莊子云野馬也塵埃也生物之息以相吹也息字有二義一曰生息二曰休息五味子溫以遂木氣之發榮酸以斂木氣之歸根生息休息皆所以益其生生不窮之氣倘其氣不治治安也咳逆上氣者風木挾火氣而乘金也為勞傷為羸瘦為陰痿為精虛者則金匱所謂虛勞諸不足風氣百疾是也風氣通於肝先聖提出虛勞大眼目惜後人不能申明其義五味子益氣中大具開闔升降之妙所以概主之唐宋以也下諸家有謂其具五味而兼治五臟者有謂其酸以斂肺色黑入腎核似腎而補腎者想當然之說究非定論也然肝治五臟得其生氣而安為本經言外之正旨仲景佐以乾薑助其溫氣俾氣與味相得而益彰是補天手段薏苡仁氣味甘微寒無毒主筋急拘攣不可屈伸久風濕痹下氣久服輕身益氣陳修園曰薏苡仁夏長秋成味甘色白稟陽明金土之精金能制風土能勝濕故治以上諸證久服輕身益氣者以濕行則脾健而身輕金清則肺治而氣益也
