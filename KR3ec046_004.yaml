body:
  text: 卷之四中品鹿茸氣味甘溫無毒主漏下惡血寒熱驚癇益氣強志生齒不老陳修園曰鹿為仙獸而多壽其臥則口鼻對尾閭以通督脈督脈為通身骨節之主腎主骨故又能補腎腎得其補則志強而齒固以志藏於腎齒為骨余也督得其補則大氣升舉惡血不漏以督脈為陽氣之總督也然角中皆血所貫沖為血海其大補衝脈可知也凡驚癇之病皆挾衝脈而作陰氣虛不能寧謐於內則附陽而上升故上熱而下寒陽氣虛不能周衛於身則隨陰而下陷故下熱而上寒鹿茸入衝脈而大補其血所以能治寒熱驚癇也至於長而為角別録謂其主惡瘡逐惡氣以一點胚血發泄已盡只有拓毒消散之功也鱉甲氣味酸平無毒主心腹癥瘕堅積寒熱去痞疾蝕肉陰蝕痔核惡肉述鱉甲氣平稟金氣而入肺味鹹無毒得水味而入腎心腹者合心下大腹小腹以及脅肋而言也癥瘕堅硬之積致發寒熱為厥陰之肝氣凝聚鱉甲氣平可以制肝味鹹可以軟堅所以主之也痞者肝氣滯也鹹平能制肝而軟堅故亦主之蝕肉陰蝕痔核惡肉一生於鼻鼻者肺之竅也一生於二便二便者腎之竅也入肺腎而軟堅所以消一切惡肉也白殭蠶氣味鹹平辛無毒主治小兒驚癇夜啼去三蟲滅黑皯令人面色好男子陰癢病凡稟金氣色白之藥俱不宜炒述殭蠶氣平為秋氣味辛為金味味鹹為水味稟金水之精也治驚癇者金能平木也治夜啼者金屬乾而主天天運旋轉晝開夜闔也殺三蟲者蟲為風木所化金主肅殺也滅黑皯令人面色好者俾水氣上滋也治男子陰癢者金能制風咸能除癢也徐靈胎曰殭蠶感風而僵凡風氣之疾皆能治之蓋借其氣以相感也或問因風以僵何以反能治風曰邪之中人也有氣而無形穿經透絡愈久愈深以氣類相反之藥投之則拒而不入必與之同類者和入諸藥使為響導則藥力至於病所而邪與藥相從藥性漸發或從毛孔出或從二便出不能復留矣此即從治之法也風寒暑濕莫不皆然此神而明之之道不專恃正治奏功矣蚱蟬古人用蟬今人用蛻氣性亦相近氣味寒咸主小兒驚癇夜啼癲病寒熱陳修園曰蚱蟬氣寒稟水氣味鹹得水味而要其感涼風清露之氣以生得金氣最全其主小兒驚癇者金能平木也蚱蟬日出有聲日入無聲故止夜啼也癲病寒熱者肝膽之風火也蚱蟬具金水之氣金能制風水能制火所以主之張隱菴曰蟬脫殭蠶皆稟金水之精故本經主治大體相同但蟬飲而不食溺而不糞蠶食而不飲糞而不溺何以相同經云飲入於胃上歸於肺谷入於胃乃傳之肺是飲食雖殊皆由肺氣之通調則尿糞雖異皆稟肺氣以傳化矣石膏氣味辛微寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡陳修園曰石膏氣微寒稟太陽寒水之氣味辛無毒得陽明燥金之味風為陽邪在太陽則惡寒發熱然必審其無汗煩燥而喘者可與麻桂並用在陽明則發熱而微惡寒然必審其口乾舌焦大渴而自汗者可與知母同用曰心下氣逆即傷寒論氣逆欲嘔之互詞曰不能息即傷寒論虛羸少氣之互詞然必審其為解后里氣虛而內熱者可與人參竹葉半夏麥冬甘草粳米同用腹中堅痛陽明燥甚而堅將至於胃實不大便之症邪鬼者陽明邪實妄言妄見或無故而生驚若邪鬼附之石膏清陽明之熱可以統治之陽明之脈從缺盆下乳石膏能潤陽明之燥故能通乳陽明主肌肉石膏外糝又能愈金瘡之潰爛也但石品見火則成石灰今人畏其寒而煅用則大失其本來之性矣下品附子氣味辛溫有大毒主風寒咳逆邪氣溫中金瘡破症堅積聚血瘕寒濕痿躄拘攣膝痛不能行步以刀削去皮臍每個剖作四塊用滾水微溫泡三日一日一換去鹽味曬半燥剖十六塊於銅器炒熟用之近世以便煮之非法也陳修園曰素問謂以毒藥攻邪是回生妙手後人立補養等法是模稜巧術究竟攻其邪而正氣復是攻之即所以補之也附子味辛氣溫火性迅發無所不到故為回陽救逆第一品藥本經云風寒咳逆邪氣是寒邪之逆於上焦也寒濕痿躄拘攣膝痛不能行步是寒邪著於下焦筋骨也症堅積聚血瘕是寒氣凝結血滯於中也考大觀本咳逆邪氣句下有溫中金瘡四字以中寒得暖而溫血肉得暖而合也大意上而心肺下而肝腎中而脾胃以及血肉筋骨營衛因寒濕而病者無有不宜即陽氣不足寒氣內生大汗大瀉大喘中風卒倒等症亦必仗此大氣大力之品方可挽回此本經言外意也又曰附子主寒濕諸傢俱能解到而仲景用之則化而不可知之謂神且夫人之所以生者陽也亡陽則死亡字分二字一無方切音忘逃也即春秋傳出亡之義也一微夫切音無無也論語亡而為有孟子問有餘曰亡矣之義也誤藥大汗不止為亡陽如唐之幸蜀仲景用四逆湯真武湯等法以迎之吐利厥冷為亡陽如周之守府仲景用通脈四逆湯薑附湯以救之且太陽之標陽外呈而發熱附子能使之交於少陰而熱已少陰之神機病附子能使自下而上而脈生周行通達而厥愈合苦甘之芍草而補虛合苦淡之苓芍而溫固元妙不能盡述按其立法與本經之説不同豈仲景之創見歟然本經謂氣味辛溫有大毒七字仲景即於比悟出附子大功用溫得東方風木之氣而溫之至則為熱內經所謂少陰之上君火主之是也辛為西方燥金之味而辛之至則反潤內經所謂辛以潤之是也凡物性之偏處則毒偏而至無可加處則大毒因大毒二字知附子之溫為至極辛為至極也仲景用附子之溫有二法雜於苓芍甘草中雜於地黃澤瀉中如冬日可愛補虛法也佐以薑桂之熱佐以麻辛之雄如夏日可畏救陽法也用附子之辛亦有三法桂枝附子湯桂枝附子去桂加白朮湯甘草附子湯辛燥以祛除風濕也附子湯芍藥甘草附子湯辛潤以溫補水藏也若白通湯通脈四逆湯加人尿豬膽汁則取西方秋收之氣保復元陽則有大封大固之妙矣後世虞天民張景嶽亦極贊其功然不能從本經中細繹其義以闡發經方之妙徒逞臆説以極贊之反為蛇足矣半夏氣味辛平有毒主傷寒寒熱心下堅胸脹咳逆頭眩咽喉腫痛腸鳴下氣止汗陳修園曰半夏氣平稟天秋金之燥氣而入手太陰味辛有毒得地西方酷烈之味而入手足陽明辛則能開諸結平則能降諸逆也傷寒寒熱心下堅者邪積於半表半里之間其主之者以其辛而能開也胸脹咳逆咽喉腫痛頭眩上氣者邪逆於巔頂胸膈之上其主之者以其平而能降也鳴者大腸受濕則腸中切痛而鳴濯濯也其主之者以其辛平能燥濕也又云止汗者別著其辛中帶澀之功也仲景於小柴胡湯用之治寒熱瀉心湯用之以治胸滿腸鳴少陰咽痛亦用之金匱頭眩亦用之且嘔者必加此味大得其開結降逆之旨用藥悉遵本經所以為醫中之聖又曰今人以半夏功專祛痰概用白礬煮之服者往往致吐且致酸心少食製法相沿之陋也古人只用湯洗七次去涎今人畏其麻口不敢從之余每年收乾半夏數十斤洗去粗皮以生薑汁甘草水浸一日夜洗淨又用河水浸三日一日一換濾起蒸熟曬乾切片隔一年用之甚效此藥蓋是太陰陽明少陽之大藥祛痰卻非專長故仲景諸方加減俱云嘔者加半夏痰多者加茯苓末聞以痰多加半夏也大黃氣味苦寒無毒主下淤血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟陳修園曰大黃色正黃而臭香得土之正氣正色故專主脾胃之病其氣味苦寒故主下泄凡血淤而閉則為寒熱腹中結塊有形可徵曰症可聚可散曰瘕五臟為積六腑為聚以及留飲宿食得大黃攻下皆能已之自蕩滌腸胃下五句是申明大黃之效末一句是總結上四句又大申大黃之奇效也意謂人只知大黃蕩滌腸胃功在推陳抑知推陳即所以致新乎人知大黃通利水穀功在化食抑知化食即所以調中乎且五臟皆稟氣於胃胃得大黃運化之力而安和而五臟亦得安和矣此本經所以有黃良之名也有生用者有用清酒洗者桃仁氣味苦甘平無毒主淤血血閉癥瘕邪氣殺小蟲雙仁者大毒陳修園曰桃仁氣平為金氣味苦為大味味甘為上味所以瀉多而補少者以氣平主降味苦主泄甘味之少不能與之為敵也徐靈胎曰桃得三月春和之氣以生而花色鮮明似血故凡血鬱血結之疾不能調和暢達者此能入於其中而和之散之然其生血之功少而去淤之功多者何也蓋桃核本非血類故不能有所補益若淤瘕皆已敗之血非生氣不能流通桃之生氣皆在於仁而味苦又能開泄故能逐舊而不傷新也旋覆花氣味鹹溫有小毒主結氣脅下滿驚悸除水去五臟間寒熱補中益氣陳修園曰旋覆花氣溫稟風氣而主散味鹹得水味潤下而耎堅味勝於氣故以味為主唯其耎堅故結氣脅下滿等症皆能已之唯其潤下故停水驚悸及五臟鬱滯而生寒熱等症皆能已之借咸降之力上者下之水氣行痰氣消而中焦自然受補矣本經名金沸草爾雅名盜庚七八月開花如金錢菊相傳葉上露水滴地即生桔梗氣味辛微溫有小毒主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣張隱菴曰桔梗治少陽之脅滿上焦之胸痹中焦之腹滿下焦之腸鳴又驚則氣上恐則氣下悸則動中是桔梗為氣分之藥上中下皆可治也張元素不參經義謂桔梗乃舟楫之藥載諸藥而不沉今人熟念在口終身不忘以元素杜撰之言為是則本經幾可廢矣醫門豪傑之士能明神農之本經軒岐之靈素仲祖之論略則千百方書皆為糟粕設未能也必為方書所囿而矇蔽一生矣可畏哉葶藶味辛寒主癥瘕積聚結氣水飲所結之疾飲食寒熱破堅逐邪亦皆水氣之疾通利水道肺氣降則水道自通徐靈胎曰葶藶滑潤而香專瀉肺氣肺為水源故能瀉肺即能瀉水凡積聚寒熱從水氣來者此藥主之大黃之瀉從中焦始葶藶之瀉從上焦始故傷寒論中承氣湯用大黃而陷胸湯用葶藶也連翹氣味苦平主寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒夏枯草氣味苦辛寒主寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身代赭石氣味苦寒主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下述代赭石氣寒入腎味苦無毒入心腎為坎水代赭氣寒益腎則腎水中一陽上升心為離火代赭味苦益心則心火中一陰下降水升火降陰陽互藏其宅而天地位矣故鬼疰賊風精魅惡鬼以及蠱毒腹中邪毒皆可主之腎主二便心主血血熱則赤沃漏下苦寒清心心腎交所以主女子赤沃漏下仲景代赭旋覆花湯用之極少後人昧其理而重用之且賴之以鎮納諸氣皆荒經之過也
