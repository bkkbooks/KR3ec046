body:
  text: 卷之三中品乾薑氣味辛溫無毒主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢生者尤良陳修園曰乾薑氣溫稟厥陰風木之氣若溫而不烈則得沖和之氣而屬土也味辛得陽明燥金之味若辛而不偏則金能生水而轉潤矣故乾薑為臟寒之要藥也胸中者肺之分也肺寒則金失下降之性氣壅於胸中而滿也滿則氣上所以咳逆上氣之症生焉其主之者辛散溫行也中者土也土虛則寒而此能溫之止血者以陽虛陰必走得暖則血自歸經也出汗者辛溫能發散也逐風濕痹者治寒邪之留於筋骨也治腸澼下痢者除寒邪之陷於腸胃也以上諸治皆取其雄烈之用如孟子所謂剛大浩然之氣塞於天地之間也生則辛味渾全故又申言曰生者尤良即金匱治肺痿用甘草乾薑湯自注炮用以肺虛不能驟受過辛之味炮之使辛味稍減亦一時之權宜非若後世炮黑炮灰全失姜之本性也葉天士亦謂炮黑入腎何其陋歟生薑氣味辛微溫無毒久服去臭氣通神明陳修園曰凡藥氣溫屬厥陰風木大溫為熱屬少陰君火微溫稟春初之木氣則專入足少陽膽經也味辛屬陽明燥金大辛屬手太陰肺手陽明大腸微辛為土中之金則專入足陽明胃經也仲景桂枝湯等生薑與大棗同用者取其辛以和肺衛得棗之甘以養心營合之能兼調營衛也真武湯茯苓桂枝湯用之者以辛能利肺氣氣行則水利汗止肺為水之上源也大小柴胡湯用之者以其為少陽本經之藥也吳茱萸湯用之者以其安陽明之氣陽明之氣以下行為順而嘔自止矣少陰之氣上交於陽明中土而利亦止矣凡此之類本經雖未明言而仲景於氣味中獨悟其神妙也久服去臭氣通神明者以臭氣為濁陰之氣神明為陽氣之靈言其有扶陽抑陰之效也今人只知其散邪發汗而不知其有匡正止汗之功每於真武湯近效白朮湯輒疑生薑而妄去之皆讀書死於句下過也又病家每遇方中有生薑則曰素有血疾或曰曾患眼赤及喉痹等症不敢輕服是亦自置死地也又何怨哉蔥白氣味辛平無毒作湯治傷寒寒熱中風面目浮腫能出汗陳修園曰蔥白辛平發汗太陽為寒水之經寒傷於表則發熱惡寒得蔥白之發汗而解矣風為陽邪多傷於上風勝則面目浮腫得蔥白之發汗而消矣此猶人所易知也至於仲景通脈四逆湯面赤者加蔥非取其引陽氣以歸根乎白通湯以之命名者非取其葉下之白領薑附以入腎宮急救自利無脈命在頃刻乎二方皆回陽之神劑回陽先在固脫仲師豈反用發汗之品學者不參透此理總屬誤人之庸醫當歸氣味苦溫無毒主咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏中絶子諸惡瘡瘍金瘡煮汁飲之參各家說當歸氣溫稟木氣而入肝味苦無毒得火味而入心其主咳逆上氣者心主血肝存血血枯則肝木挾心火而刑金當歸入肝養血入心清火所以主之也肝為風心為火風火為陽陽盛則為但熱不寒之溫瘧而肺受風火之邪肺氣怯不能為皮毛之主故寒熱洗洗在皮膚之中當歸能令肝血足而風定心血足而火息則皮膚中之寒熱可除也肝主藏血補肝所以止漏也手少陰脈動甚則為有子補心即所以種子也瘡瘍俱屬心火血足則心火息矣金瘡無不失血血長則金瘡瘳矣煮汁飲之四字則言先聖大費苦心謂中焦受氣取汁變化而赤是謂血當歸煮汁滋中焦之汁與地黃作湯同義可知時傳炒燥土炒反涸其自然之汁大失經旨芎藭氣味辛溫無毒主中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子陳修園曰芎藭氣溫稟春氣而入肝味辛無毒得金味而入肺風為陽邪而傷於上風氣通肝肝經與督脈會於顛頂而為病芎藭辛溫而散邪所以主之血少不能熱膚故生寒而為痹血少不能養筋故筋結而為攣筋縱而為緩筋縮而為急芎藭辛溫而活血所以主之治金瘡者以金瘡從皮膚以傷肌肉芎藭稟陽明金氣能從肌肉而達皮膚也婦人以血為主血閉不通則不生育芎藭辛溫通經而又能補血所以治血閉無子也淫羊藿氣味辛寒無毒主陰痿絶傷莖中痛利小便益氣力強志羊脂拌炒陳修園曰淫羊藿氣寒稟天冬水之氣而入腎味辛無毒得地之金味而入肺金水二臟之藥細味經文俱以補水臟為主陰者宗筋也宗筋屬於肝木木遇烈日而痿一得氣寒之羊藿即如得甘露而挺矣絶傷者絡脈絶而不續也金匱有云絡脈者陰精陽氣所往來也羊藿氣寒味辛具水天之氣環轉運行而能續之也莖主莖也火鬱於中則痛熱者清之以寒郁者散之以辛所以主莖中痛也小便主於膀胱必假三焦之氣化而出三焦之火盛則孤陽不化而為溺短溺閉之證一得羊藿之氣寒味辛金水相函陰陽濡布陽得陰而化則小便利矣肺主氣腎藏志孟夫子云夫志氣之帥也潤肺之功歸於補腎其益氣力強志之訓即可於孟夫子善養剛大之訓悟之也第此理難與時醫道耳葉天士云淫羊藿浸酒治偏風不遂水涸腰痛荊芥氣味辛溫無毒主寒熱鼠瘻瘰癧生瘡破結聚氣下淤血除濕疸參荊芥氣溫稟木氣而入肝膽味辛無毒得金味而入肺氣勝於味以氣為主故所主皆少陽相火厥陰風木之症寒熱往來鼠瘻瘰癧生瘡等症乃少陽之為病也荊芥辛溫以發相火之郁則病愈矣飲食入胃散精於肝肝不散精則氣滯而為積聚肝藏主血血隨氣而運行肝氣一滯則血亦滯而為淤乃厥陰之為病也荊芥辛溫以達肝木之氣則病愈矣其除濕疸者以疸成於濕荊芥溫而兼辛辛入肺而調水道水道通則濕疸除矣今人炒黑則變為燥氣而不能達失其辛味而不能發且謂為産後常用之品昧甚麻黃氣味苦溫無毒主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚去節根陳修園曰麻黃氣溫稟春氣而入肝味苦無毒得火味而入心心主汗肝主疏泄故為發汗上藥其所主皆系無汗之症太陽證中風傷寒頭痛發熱惡寒無汗而喘系宜麻黃以發汗但熱不寒名曰溫瘧熱甚無汗頭痛亦宜麻黃以發汗咳逆上氣為手太陰之寒證發熱惡寒為足太陽之表證亦宜麻黃以發汗即症堅積聚為內病亦系陰寒之氣凝聚於陰分之中日積月纍而漸成得麻黃之發汗從陰出陽則症堅積聚自散凡此皆發汗之功也根節古云止汗是引止汗之藥以達於表而速效非麻黃根節自能止汗舊解多誤葛根氣味甘辛平無毒主消渴身大熱嘔吐諸痹起陰氣解諸毒葛谷氣味甘平無毒主下痢十歲以上葉天士曰葛根氣平稟天秋平之金氣入手太陰肺經味甘辛無毒得地金土之味入足陽明燥金胃其主消渴者辛甘以升騰胃氣氣上則津液生也其主身大熱者氣平為秋氣秋氣能解大熱也脾有濕熱則壅而嘔吐葛根味甘升發胃陽胃陽鼓動則濕熱下行而嘔吐止矣諸痹皆起於氣血不流通葛根辛甘和散氣血活諸痹自愈也陰者從陽者也人身陰氣脾為之原脾與胃合辛甘入胃鼓動胃陽陽健則脾陰亦起也甘者土之沖味平者金之和氣所以解諸毒也張隱菴曰元人張元素謂葛根為陽明仙藥若太陽初病用之反引邪入陽明等論皆臆說也余讀仲祖傷寒論方有葛根湯治太陽病項背几几又治太陽與陽明合病若陽明本病只有白虎承氣諸湯並無葛根湯證況葛根主宣通經脈之正氣以散邪豈反引邪內入耶前人學不明經屢為異說李時珍一概收録不加辨正學者看本草發明當合經論參究庶不為前人所誤黃芩氣味苦寒無毒主諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火瘍陳修園曰黃芩與黃連黃柏皆氣寒味苦而色黃主治大略相似大抵氣寒皆能除熱味苦皆能燥濕色黃者皆屬於土黃而明亮者則屬於金金借土之色以為色故五金以黃金為貴也但黃芩中空似腸胃腸為手陽明胃為足陽明其主諸熱者指腸胃諸熱病而言也黃疸為大腸經中之鬱熱腸澼泄痢者為大腸腑中之鬱熱逐水者逐腸中之水下血閉者攻腸中之蓄血惡瘡疽蝕火瘍者為肌肉之熱毒陽明主肌肉瀉陽明之火即所以解毒也本經之言主治如此仲景於少陽經用之於心下悸易茯苓於腹痛易芍藥又於本經言外別有會悟也元參氣味苦微寒無毒主腹中寒熱積聚女子産乳余疾補腎氣令人明目陳修園曰元參所以治腹中諸疾者以其啓腎氣上交於肺得水天一氣上下環轉之妙用也張隱菴注解甚妙詳于丹參注中其云主産乳余疾者以産後脫血則陰衰而火無所制治之以寒涼既恐傷中加之以峻補又恐拒隔惟元參清而帶微補故為産後要藥令人目明者黑水神光屬腎自能明目也丹參氣味苦微寒無毒主心腹邪氣腸鳴幽幽如走水寒熱積聚破症除瘕止煩滿益氣張隱菴曰丹參元參皆氣味苦寒而得少陰之氣化但元參色黑稟少陰寒水之精而上通於天丹參色赤稟少陰君火之氣而下交於地上下相交則中土自和故元參下交於上而治腹中寒熱積聚丹參上交於下而治心腹寒熱積聚君火之氣下交則土溫而水不泛溢故治腸鳴幽幽如走水破症除瘕者治寒熱之積聚也止煩滿益氣者治心腹之邪氣也夫止煩而治心邪止滿而治腹邪益正氣所以治邪氣也陳修園曰今人謂一味丹參功兼四物湯共認為補血行血之品為女科之專藥而丹參之真功用掩矣丹皮氣味辛寒無毒主寒熱中風瘛瘲驚癇邪氣除症堅淤血留舍腸胃安五臟療癰瘡陳修園曰丹皮氣寒稟水氣而入腎味辛無毒得金味而入肺心火具炎上之性火鬱則寒火發則熱丹參稟水氣而制火所以主之肝為風臟中風而害其筋則為瘛瘲中風而亂其魂則為驚癇丹皮得金味以平肝所以主之邪氣者風火之邪也邪氣動血留舍腸胃淤積症堅丹皮之寒能清熱辛能散結可以除之肺為五臟之長肺安而五臟俱可安癰瘡皆屬心火心火降而癰瘡可療防己氣味辛平無毒主風寒溫瘧熱氣諸癇除邪利大小便述防己氣平稟金之氣味辛無毒得金之味入手太陰肺經風寒溫瘧者感風寒而患但熱不寒之瘧也熱氣諸癇者心有熱而患牛馬豬羊雞諸癇也溫熱皆為陽邪癇瘧皆屬風木防己可以統治之除邪者又申言可除以上之邪氣也然肺為水之上源又與大腸相為表裡防己之辛平調肺氣則二便利矣張隱菴曰經云水道不行則形消氣索是水有隨氣而運行於膚表者有水火上下之相濟者如氣滯而水不行則為水病痰病矣防己生於漢中者破之紋如車輻莖藤空通主通氣行水以防己土之制故有防己之名金匱方治水病有防己黃耆湯防己茯苓湯治痰病有木防己湯防己加茯苓芒硝湯千金方治遺尿小便澀有三物木防己湯蓋氣運於上而水能就下也而李東垣有云防己乃下焦血分之藥病在上焦氣分者禁用又云如險健之人幸災樂禍首為亂階若善用之亦可敵凶突險此瞑眩之藥故聖人存而不廢噫如此議論不知從何處參出夫氣化而後水行防己乃行氣利水之品反云上焦氣分不可用何不通之甚乎防己能運行去病是運中有補本經列於中品之前奚為存而不廢緣其富而貪名無格物實學每為臆說使後人遵之如格言畏之若毒藥非古人之罪乎李時珍乃謂千古而下惟東垣一人誤矣嗟嗟安得伊歧重出世更將經旨復重宣也狗脊氣味苦平主腰背強關機緩急風痹寒濕膝痛頗利老人秦艽氣味苦平無毒主寒熱邪氣寒濕風痹肢節痛下水利小便張隱菴曰秦艽氣味苦平色如黃土羅紋交糾左右旋轉稟天地陰陽交感之氣蓋天氣左旋右轉地氣右旋左轉左右者陰陽之道路主治寒熱邪氣者地氣從內以出外陰氣外交於陽而寒熱邪氣自散矣治寒濕風痹肢節痛者天氣從外以入內陽氣內交於陰則寒濕風三邪合而成痹以致肢節痛者可愈也地氣運行則水下天氣運行則小便利紫菀氣味苦溫無毒主咳逆上氣胸中寒熱結氣去蠱毒痿躄安五臟張隱菴曰紫者黑赤之間色也黑赤水火之色也紫菀氣味苦溫稟火氣也其質陰柔稟水氣也主治咳逆上氣者啓太陽寒水之氣從皮毛而合肺也治胸中寒熱結氣者助少陰火熱之氣通利三焦而上達也蠱毒在腹屬土火能生土故去蠱毒痿躄在筋屬水水能生木故去痿躄水火者陰陽之徵兆也水火交則陰陽合故安五臟知母氣味苦寒無毒主消渴熱中除邪氣肢體浮腫下水補不足益氣葉天士曰知母氣寒稟水氣而入腎味苦無毒得火味而入心腎屬水心屬火水不制火火爍津液則病消渴火熏五內則病熱中其主之者苦清心火寒滋腎水也除邪氣者苦寒之氣味能除燥火之邪氣也熱勝則浮火勝則腫苦者清火寒能退熱故主肢體浮腫也腫者水臟其性惡燥燥則開合不利而水反蓄矣知母寒滑滑利關門而水自下也補不足者苦寒補寒水之不足也益氣者苦寒益五臟之陰氣也愚按金匱有桂枝芍藥知母湯治肢節疼痛身體尪羸腳腫如脫可知長沙諸方皆從本經來也貝母氣味辛平無毒主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙陳修園曰貝母氣平味辛氣味俱屬於金為手太陰手陽明藥也其主傷寒煩熱者取西方之金氣以除酷暑傷寒論以白虎湯命名亦此意也其主淋瀝邪氣者肺之治節行於膀胱則邪熱之氣除而淋瀝愈矣疝瘕為肝木受病此則金平木也喉痹為肺竅內閉此能宣通肺氣也乳少為陽明之汁不通金瘡為陽明之經脈受傷風痙為陽明之宗筋不利貝母清潤而除熱所以統治之今人以主治痰嗽大失經旨且李士材謂貝母主燥痰半夏主濕痰二物如水炭之反皆臆說也栝蔞根氣味苦寒無毒主消渴身熱煩滿大熱補虛安中續絶傷陳修園曰栝蔞根氣寒稟天冬寒之水氣而入腎與膀胱味苦無毒得地南方之火味而入心火盛爍液則消渴火浮於表則身熱火盛於裡則煩滿大熱火盛則陰虛陰虛則中失守而不安栝蔞根之苦寒清火可以統主之其主續絶傷者以其蔓延能通陰絡而續其絶也實名栝蔞金匱取治胸痹傷寒論取治結胸蓋以能開胸前之結也張隱菴曰半夜起陰氣於脈外上與陽明相合而成火土之燥花粉起陰津於脈中天癸相合而能滋其燥金傷寒金匱諸方用半夏以助陽明之氣渴者燥熱太過即去半夏易花粉以滋之聖賢立加減之方必推物理所以然芍藥氣味苦平無毒主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣陳修園曰芍藥氣平是夏花而燥金之氣味苦是得少陰君火之味氣平下降味苦下泄而走血為攻下之品非補養之物也邪氣腹痛小便不利及一切諸痛皆氣滯之病其主之者以苦平而泄其氣也血痹者血閉而不行甚則為寒熱不調堅積者積久而堅實甚則為疝瘕滿痛者皆血滯之病其主之者以苦平而行其血也又云益氣者謂邪氣得攻而淨則元氣自然受益非謂芍藥能補氣也今人妄改聖經以酸寒二字易苦平誤認為斂陰之品殺人無算試取芍藥而嚼之酸味何在乎張隱菴曰赤芍白芍花異而根無異今肆中一種赤芍藥不知何物之根為害殊甚木通氣味辛平無毒主除脾胃寒熱通利九竅血脈關節令人不忘去惡蟲木通本經名通草陳士良撰食性本草改為木通今復有所謂通草即古之通脫木也與此不同張隱菴曰木通藤蔓空通其色黃白氣味辛平稟土金相生之氣化而為通關利竅之藥也稟土氣故除脾胃之寒熱藤蔓空通故通利九竅血脈關節血脈通而關竅利則令人不忘稟金氣故去惡蟲防己木通皆屬空通蔓草防己取用在下之根則其性自下而上從內而外木通取用在上之莖則其性自上而下自外而內此根升梢降一定不易之理後人用之主利小便須知小便之利亦必上而後下外而後內也白芷氣味辛溫主女人漏下赤白血閉陰腫寒熱風侵頭目淚出長肌膚潤澤可作面脂苦參氣味苦寒主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚徐靈胎曰此以味為治也苦入心寒除火故苦參專治心經之火與黃連功用相近但黃連似去心臟之火為多苦參似去心府小腸之火為多則以黃連之氣味清而苦參之氣味濁也按補中二字亦取其苦以燥脾之義也水萍氣味辛寒主暴熱得水之氣故能除熱身癢濕熱在皮膚下水氣萍入水不濡故能滌水勝酒水氣勝則酒氣散矣長鬚發益皮毛之血氣主消渴得水氣之助久服輕身亦如萍之輕也徐靈胎曰水萍生於水中而能出水上且其葉入水不濡是其性能敵水者也故凡水濕之病皆能治之其根不著土而上浮水面故又能主皮毛之疾款冬花氣味辛溫無毒主咳逆上氣善喘喉痹諸驚癇寒熱邪氣張隱菴曰款冬生於水中花開紅白氣味辛溫從陰出陽蓋稟水中之生陽而上通肺金之藥也太陽寒水之氣不從皮毛外交於肺則咳逆上氣而善喘款冬稟水氣而通肺故可治也厥陰少陽木火之氣結於喉中則如喉痹款冬得金水之氣金能平木水能制火故可治也驚癇寒熱邪氣為病不止一端故曰諸驚癇寒熱邪氣款冬稟太陽寒水之氣而上行外達則陰陽水火之氣自相交會故可治也厚朴氣味苦溫無毒主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲生用則解肌而達表炙香則運土而助脾陳修園曰厚朴氣溫稟木氣而入肝味苦無毒得火味而入心然氣味厚而主降降則溫而專於散苦而專於泄故所主皆為實症中風有便溺阻隔症傷寒有下之微喘症有發汗後腹脹滿症大便硬症頭痛有濁氣上衝症俱宜主以厚朴也至於溫能散寒苦能泄熱能散能泄則可以解氣逆之驚悸能散則氣行能泄則血行故可以治氣血痹及死肌也三蟲本濕氣所化厚朴能散而泄之則三蟲可去也寬脹下氣經無明文仲景因其氣味苦溫而取用之得本經言外之旨也梔子氣味苦寒無毒主五內邪氣胃中熱氣面赤酒疱齄鼻白癩赤癩瘡瘍陳修園曰梔子氣寒稟水氣而入腎味苦得火味而入心五內邪氣五臟受熱邪之氣也胃中熱氣胃經熱煩懊憹不眠也心之華在面赤則心火盛也鼻屬肺酒疱齄鼻金受火克而色赤也白癩為濕赤癩為熱瘡瘍為心火梔子下稟寒水之精上結君火之實能起水陰之氣上滋復導火熱之氣下行故統主之以上諸症唯生用之氣味尚存若炒黑則為死灰無用之物矣仲景梔子豉湯用之者取其交媾水火調和心腎之功加香豉以引其吐非梔子能湧吐也俗本謂翻子生用則吐炒黑則不吐何其陋歟按仲景云舊有微溏者勿用枳實氣味苦寒無毒主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣張隱菴曰枳殼氣味苦寒冬不落葉稟少陰標本之氣化臭香形園花白多刺瓤肉黃白又得陽明金土之氣化主治大風在皮膚中如麻豆苦癢者得陽明金氣而制風稟少陰水氣而清熱也除寒熱結者稟少陰本熱之氣而除寒標陰之氣而除熱也止痢長肌肉者得陽明中土之氣也五臟發原於先天之少陰生長於後天之陽明故主利五臟得少陰之陰故益氣得陽明之氣故輕身仲祖本論有大承氣湯用炙厚朴炙枳實小承氣湯用生厚朴生枳實生熟之間有意存焉學者不可不參按本經有枳實無枳殼唐開寶始分之然枳殼即枳實之大者性宣發而氣散不如枳實之完結然既是一種亦不必過分黃柏氣味苦寒無毒主五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡陳修園曰黃柏氣寒稟天冬寒之水氣味苦無毒得地南方之火味皮厚色黃得太陰中土之化五臟為陰凡經言主五臟者皆主陰之藥也治腸胃中熱結者寒能清熱也治黃疸腸痔者苦能勝濕也止泄利者濕熱泄痢唯苦寒能除之而且能堅之也女子胎漏下血因血熱妄行赤白帶下及陰戶傷蝕成瘡皆因濕熱下注黃柏寒能清熱苦可燥濕所以主之然皆正氣未傷熱毒內盛有餘之病可以暫用否則不可姑試也凡藥之燥者未有不熱而寒者未有不濕黃柏於清熱之中而兼燥濕之效山茱萸氣味酸平無毒主心下邪氣寒熱溫中逐寒濕痹去三蟲久服輕身去核陳修園曰山茱萸色紫赤而味酸平稟厥陰少陽木火之氣化手厥陰心包足厥陰肝皆屬於風木也手少陽三焦足少陽膽皆屬於相火也心下巨闕穴乃手闕陰心包之募又心下為脾之分曰邪氣者脾之邪實為肝木之邪也足厥陰肝木血少氣亢則克脾土並於陽則熱並於陰則寒也又寒熱往來為少陽之病山萸稟木火之氣化故咸主之山萸味酸收斂斂火歸於下焦火在下謂之少火少火生氣所以溫中山萸味酸入肝肝主藏血血能充膚熱肉所以逐周身寒濕之痹三蟲者厥陰風木之化也仲景烏梅丸之酸能治蛔厥即此物悟出肝者敢也生氣生血之臟也孫真人生脈散中有五味之酸能治倦怠而輕身亦從此物悟出張隱菴曰仲祖八味丸用山茱萸後人去附桂改為六味丸以山茱萸為固精補腎水之藥此外並無他用皆因安於苟簡不深討故也今詳觀本經山茱萸之功能如此學者能於本經之內會悟而廣其用庶無拘隘之弊吳茱萸氣味辛溫有小毒主溫中下氣止痛又除濕血痹逐風邪開腠理咳逆寒熱泡一次用陳修園曰吳萸氣溫稟春氣而入肝味辛有小毒得金味而入肺氣溫能祛寒而大辛之味又能俾肺令之獨行而無所旁掣故中寒可溫氣逆可下胸腹諸痛可止皆肺令下行坐鎮而無餘事仲景取治陽明食谷欲嘔症及乾嘔吐涎沫症從本經而會悟於言外之旨也肺喜溫而惡寒一得吳萸之大溫大辛則水道通調而濕去肝藏血血寒則滯而成痹一得吳萸之大辛大溫則血活而痹除風邪傷人則腠理閉而為寒熱咳逆諸症吳萸大辛大溫開而逐之則咳逆寒熱諸證俱平矣然猶有疑者仲景用藥悉遵本經而少陰病吐利手足逆冷煩燥欲死者吳茱萸湯主之二十字與本經不符而不知少陰之臟皆本陽明水穀以資生而復交於中土若陰陽之氣不歸中土則上吐而不利水火之氣不歸中土則下燥而上煩中土之氣內絶則四肢逆冷而過肘膝法在不治仲景取吳茱萸大辛大溫之威烈佐人參之沖和以安中氣薑棗之和胃以行四末專求陽明是得絶處逢生之妙張隱菴葉天士之解俱淺杏仁氣味甘苦溫冷利有小毒主咳逆上氣雷鳴喉痹下氣産乳金瘡寒心奔豚湯泡去皮雙仁者大毒勿用陳修園曰杏仁氣味甘苦其實苦重於甘其性帶濕其質冷利冷利者滋潤之意也下氣二字亦足以盡其功肺實而脹則為咳逆上氣雷鳴喉痹者火結於喉為痹痛痰聲之響如雷鳴也杏仁下氣所以主之氣有餘便是火氣下即火下故乳汁可通瘡口可合也心陽虛則寒水之邪自下上奔犯於心位杏仁有下氣之功伐寒水於下即所以保心陽於上也凡此皆治有餘之症若勞傷咳嗽之人服之必死時醫謂産於叭噠者味純甘可用而不知純甘非杏仁之正味既無苦降之功徒存其濕以生痰甘以壅氣陰受其害至死不悟惜哉烏梅氣味酸溫平澀無毒主下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑痣蝕惡肉陳修園曰烏梅氣平稟金氣而入肺氣溫稟木氣而入肝味酸無毒得木味而入肝味澀即酸之變味也味勝於氣以味為主梅得東方之味花放於冬成熟於夏是稟冬令之水精而得春生之氣而上達也主下氣者生氣上達則逆氣自下矣熱煩滿心不安傷寒論厥陰症以氣上撞心心疼熱等字概之能下其氣而諸病皆愈矣脾主四肢木氣剋土則肢體痛肝主藏血血不灌溉則偏枯不仁而為死肌烏梅能和肝氣養肝血所以主之去青黑痣及蝕惡肉者酸收之味外治能消痣與肉也張隱菴云後人不體經義不窮物理但以烏梅為酸斂收澀之藥而春生上達之性未之講也惜哉犀角氣味苦酸咸寒無毒主百毒蠱疰邪鬼瘴氣解鉤吻鴆羽蛇毒除邪不迷惑魘寐久服輕身陳修園曰犀角氣寒稟水之氣也味苦酸鹹無毒得木火水之味也主百毒蠱疰邪鬼瘴氣者以犀為靈異之獸借其靈氣以辟邪也解鉤吻鴆羽蛇毒者以牛屬土而犀居水得水土之精毒物投水土中而俱化也不迷惑魘寐輕身者言水火既濟之效也今人取治血症與經旨不合羚羊角氣味鹹寒無毒主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥常不魘寐俗稱羚羊參羚羊角氣寒味鹹無毒入腎與膀胱二經主明目者鹹寒以補水水足則目明也益氣者水能化氣也起陰者陰器為宗筋而屬於肝肝為木木得烈日而萎得雨露而挺也味鹹則破血故主去惡血氣寒則清熱故止注下也蠱毒為濕熱之毒也鹹寒可以除之辟惡鬼不祥常不魘寐夢者誇其靈異通神之妙也
