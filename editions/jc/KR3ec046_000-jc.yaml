body:
  text: 本草附錄別錄唐本草別錄唐本草拾遺藥性海藏蜀本開寶圖經日華補遺何首烏氣味苦溫無毒主瘰癧消癰腫療頭面風瘡治五痔止心痛益血氣黑髭發悅顏色久服長筋骨益精髓延年不老亦治婦人產後及帶下諸疾開寶陳修園曰後世增入藥品余多置之而弗論唯何首烏於久瘧久痢多取用之蓋瘧少陽之邪也久而不愈少陽之氣慣為瘧邪所侮俯首不敢與爭任其出入往來絕無忌憚縱舊邪已退而新邪復乘虛入之則為瘧縱新邪未入而營衛不調之氣自襲於少陽之界亦為瘧首烏妙在直入少陽之經其氣甚雄雄則足以折瘧邪之勢其味甚澀澀則足以堵瘧邪之路邪若未淨者佐以柴苓桔半邪若已淨者佐以參朮耆歸一二劑效矣設初瘧而即用之則閉門逐寇其害有不可勝言矣久痢亦用之者以上氣欠陷當於少陽求其生髮之氣也亦以首烏之味最苦而澀苦以堅其腎澀以固其脫宜溫者與薑附同用宜涼者與芩連同用亦捷法也此外如疽瘡五痔之病則取其蔓延則通經絡瘰癧之病則取其入少陽之經精滑泄瀉及崩漏之病則取其澀以固脫若謂首烏滋陰補腎能烏鬚髮益氣血悅顏色長筋骨益精髓延年皆耳食之誤也凡物之能滋潤者必其脂液之多也物之能補養者必氣味和也試問澀滯如首烏何以能滋苦劣如首烏何以能補今之醫輩竟奉為補藥上品者蓋惑於李時珍綱目不寒不燥功居地黃之上之說也餘二十年來目擊受害者比比以醫為蒼生之司命不敢避好辯之名也延胡索氣味辛溫無毒主破血婦人月經不調腹中結塊崩中淋露產後諸血症血暈暴血衝上因損下血煮酒或酒磨服開寶肉豆蔻氣味辛溫無毒主溫中消食止泄治精冷心腹脹痛霍亂中惡鬼氣冷疰嘔沫冷氣小兒乳霍開寶補骨脂氣味辛溫無毒主五勞七傷風虛冷骨髓傷敗腎冷精流及婦人血氣墮胎開寶陳修園曰墮胎者言其人素有墮胎之病以此藥治之非謂以此藥墮之也上文主字直貫至此蓋胎借脾氣之長借腎氣之舉此藥溫補脾腎所以大有固胎之功數百年來誤以黃芩為安胎之品遂疑溫藥礙胎見開寶有墮胎二字遽以墮字不作病情解另作藥功解與上文不相連貫李瀕湖汪訒庵葉天士輩因之貽害千古或問本經牛膝本文亦有墮胎二字豈非以墮字作藥功解乎曰彼頂逐血氣句來唯其善逐所以善墮古書錯綜變化難與執一不通者道白豆蔻氣味辛溫無毒主積冷氣止吐逆反胃消穀下氣開寶縮砂仁氣味辛溫澀無毒主虛勞冷瀉宿食不消赤白泄痢腹中虛痛下氣開寶鬱金氣味苦寒無毒主血積下氣生肌止血破惡血血淋尿血金瘡唐本草陳修園曰時醫徇名有二誤一曰生脈散因其有生脈二字每用之以救脈脫入咽少頃脈未生而人已死矣一曰鬱金因其命名為郁往往取治於氣鬱之症數服之後郁末解而血脫立至矣醫道不明到處皆然而江浙閩粵尤其甚者神麯氣味辛甘溫無毒主化水穀宿食癥結積聚健脾暖胃藥性陳修園曰凡麴櫱皆主化谷谷積服此便消或鼻中如聞酒香藥性所言主治亦不外此癥結積聚者水穀之積久而成也健脾暖胃者化水穀之效也除化水穀之外並無他長今人以之常服且云祛百病怪甚考造麴之法六月六日是六神聚會之曰用白曲百斤青蒿蒼耳野蓼各自然汁三斤杏仁研泥赤小豆為末各三升以配青龍白虎朱雀元武勾陳螣蛇六神通和作餅麻葉或楮葉包罯如造醬黃法待生黃衣曬乾收之陳久者良藥用六種以配六神聚會之日罯發黃衣作曲故名六神麯今人除去六字只名神麯任意加至數十味無非克破之藥大傷元氣且有百草神麯害人更甚近日通行福建神麯其方於六神本方中去赤小豆惡其易蛀加五苓散料平胃散料及麥芽穀芽使君子榧子大黃黃芩大腹皮砂仁白蔻丁香木香藿香香附良薑芍藥防風秦艽羌活獨活川芎蘇葉荊芥防己黨參茯苓萊菔子苡米木通茶葉乾薑乾葛枳殼山楂檳榔青皮木瓜薄荷蟬蛻桃仁紅花三稜莪朮鬱金葛蒲柴胡菊花等為末製為方塊以草罯發黃衣曬乾此方雜亂無序誤人匪淺而竟盛行一時者皆誤信招牌上誇張等語而慣以肥甘自奉之輩單服此克化之品未嘗不通快一時而損傷元氣人自不覺若以入方則古人之方立法不苟豈堪此雜亂之藥礙此礙彼乎且以藥末合五穀罯造發黃而為曲只取其速於釀化除消導之外並無他長何以統治百病且表散之品因罯發而失其辛香之氣攻堅之品以罯發而失其雄入之權補養之藥氣味中和以罯發而變為臭腐穢濁之物傷脾妨胃更不待言明者自知余臨證二十年而泉州一帶先救誤服神麯之害者十居其七如感冒病宜審經以發散若服神麯則裡氣以攻伐而虛表邪隨虛而入里矣傷食新病宜助胃以克化傷食頗久宜承氣以攻下若服神麯則釀成甜酸穢腐之味滯於中焦漫無出路則為噁心脹痛矣吐瀉是陰陽之不交泄瀉是水穀不分赤白痢是濕熱下注噎隔是賁門乾槁翻胃是命門火衰痰飲是水氣泛溢與神麯更無干涉若誤服之輕則致重重則致死可不慎哉唯範志字號藥品精製法妙余與吳先生名條光同年因知其詳可恨市中多假其字號宜細辨之藿香氣味辛甘溫無毒主風水毒腫去惡氣止霍亂心腹痛別錄前胡氣味苦微寒無毒主痰滿胸脅中痞心腹結氣風頭痛去痰下氣治傷寒寒熱推陳致新明目益精別錄紅花氣味辛溫無毒主產後血暈口噤腹內惡血不盡絞痛胎死腹中並酒煮服亦主蠱毒開寶香附氣味甘微寒無毒除胸中熱充皮毛久服令人益氣長鬚眉別錄金櫻子氣味甘平無毒主脾泄下痢止小便利澀精氣久服令人耐寒輕身茯神氣味甘平無毒主闢不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神別錄張隱菴曰離松根而生者為茯苓抱松根而生者為茯神總以茯苓為勝茯苓皮茯神木後人收用各有主治然皆糟粕之藥並無精華之氣不足重也丁香氣味辛溫無毒主溫脾胃止霍亂壅脹風毒諸種齒疳䘌能發諸香開寶蜀椒氣味辛溫有毒主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣久服頭不白輕身增年去閉口去目椒目同巴豆菖蒲松脂黃蠟為挺納耳中治聾沉香氣味辛微溫無毒療風水毒腫去惡風別錄烏藥氣味辛溫無毒主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲拾遺琥珀氣味甘平無毒主安五臟定魂魄殺精魅邪氣消淤血通五淋別錄竹茹氣味甘微寒無毒主嘔啘溫氣寒熱吐血崩中別錄張隱菴曰此以竹之脈絡而通人之脈絡也人身脈絡不和則吐逆為熱矣脈絡不和則或寒或熱矣充膚熱肉澹滲皮毛之血不循行於脈絡則上吐血而下崩中矣竹茹通脈絡皆治之竹瀝氣味甘大寒無毒療暴中風風痹胸中大熱止煩悶消渴勞復別錄青皮氣味苦辛溫無毒主氣滯下食破積結及膈氣圖經木瓜氣味酸溫無毒主濕痹腳氣霍亂大吐下轉筋不止別錄枇杷葉氣味苦平無毒主卒啘不止下氣刷去毛別錄龍眼肉氣味甘平無毒主五臟邪氣安志厭食除蠱毒去三蟲久服強身聰明輕身不老通神明別錄山楂子氣味酸冷無毒煮汁服止水痢沐頭洗身治瘡癢小麥氣味甘寒無毒主除客熱止煩渴咽燥利小便養肝氣止漏血吐血令女人易孕別錄馬料豆氣味甘平無毒生研塗癰腫煮汁殺鬼毒止痛久服令人身重綠豆氣味甘寒無毒主丹毒煩熱風疹藥石發動熱氣奔豚生研絞汁服亦煮食消腫下氣壓熱解礬石之毒用之勿去皮令人小壅開寶扁豆氣味甘微溫無毒主和中下氣別錄穀芽氣味苦溫無毒主寒中下氣除熱別錄陳修園曰凡物逢春萌芽而漸生長今取干谷透發其芽更能達木氣以制化脾土故能消導米穀積滯推之麥芽黍芽大豆黃卷性皆相近而麥春長夏成尤得木火之氣凡怫鬱致成膨脹等症用之最妙人但知其消穀不知其疏肝是猶稱驥以力也豆豉氣味苦寒無毒主傷寒頭痛寒熱瘴氣惡毒煩燥滿悶虛勞喘吸兩腳疼冷別錄飴糖氣味甘大溫無毒主補虛氣止渴去血別錄薄荷氣味辛溫無毒主賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣益汁服亦堪生食唐本草香薷氣味辛微溫無毒主霍亂腹痛吐下散水腫別錄白芥子氣味辛溫無毒發汗主胸膈痰冷上氣面目黃赤醋研敷射工毒別錄五靈脂氣味甘溫無毒主療心腹冷氣小兒五疳闢疫治腸風通利血脈女子月閉酒研虎骨氣味辛微溫無毒主邪惡殺鬼疰毒止驚悸治惡瘡鼠瘻頭骨尤良別錄小茴香氣味辛溫無毒主小兒氣脹霍亂嘔逆腹冷不下食兩脅痞滿拾遺土茯苓氣味甘淡平無毒主治食之當谷不飢調中止泄健行不睡藏器治拘攣骨痛惡瘡癰腫解汞銀硃毒時珍萆薢氣味苦平無毒主腰脊痛強骨節風寒濕周痹惡瘡不瘳熱氣本經傷中恚怒陰痿失溺老人五緩關節老血別錄檳榔氣味苦辛澀溫無毒主消穀逐水除痰癖殺三蟲伏屍療寸白別錄牽牛子氣味苦寒有毒主下氣療腳滿水脹除風毒利小便別錄陳修園曰大毒大破之藥不堪以療內病惟楊梅瘡或毒發周身或結於一處甚則陰器剝鼻柱壞囟潰不合其病多從陰器而入亦必使之從陰器而出也法用牽牛研取頭末以土茯苓自然汁泛丸又以燒裩散為衣每服一錢生槐蕊四錢以土茯苓湯送下一日三服服半月效忍冬氣味甘溫無毒主寒熱身腫久服輕身長年益壽別錄陳修園曰氣溫得春氣而入肝味甘得土味而入胃何以知入胃不入脾以此物質輕味薄偏走陽分胃為陽土也其主寒熱者忍冬延蔓善走花開黃白二色黃入營分白入衛分營衛調而寒熱之病愈矣其主身腫者以風木之氣傷於中土內則病脹外則病腫昔人統名為蠱取卦象山風之義忍冬甘入胃胃為艮土艮為山溫入肝肝為風木巽為風內能使土木合德外能使營衛和諧所以善治之也久服長年益壽者誇其安內調外之功也至於瘡毒腫毒等證時醫重其功而別錄反未言及者以外科諸效特疏風祛濕調和營衛之餘事耳馬兜鈴氣味苦寒無毒主肺熱咳嗽痰結喘促血痔瘻瘡開寶陳修園曰氣寒得水氣入腎味苦得火味入心雖云無毒而偏寒之性多服必令吐利不止也內經云肺喜溫而惡寒若開寶所云肺熱咳嗽為絕少之症所主咳嗽痰結喘促之症與血痔瘻瘡外症同一施治其為涼瀉攻堅之性無疑今人惑於錢乙補肺阿膠散一方取用以治虛嗽百服百死鉤藤氣味微寒無毒主小兒寒熱十二驚癇別錄人乳氣味甘咸平無毒主補五臟令人肥白悅澤別錄小便氣味鹹寒無毒主療寒熱頭痛溫氣童男者尤良別錄按虻蟲水蛭及蕪花大戟甘遂等不常用之藥集隘不能具載柯韻伯抵當湯十棗湯方論極妙宜熟讀之
